      { q: "下列何者是產業生命週期「震盪期」的典型現象？", opts: ["大量新進者加入","淘汰整併，弱勢廠商退出","技術百花齊放","市場需求快速增長"], ans: 1, exp: "震盪期是成長放緩後的淘汰期，無法取得規模或差異化優勢的廠商被迫退出或被併購。" },
      { q: "面板產業中，中國京東方（BOE）崛起的主要競爭策略是什麼？", opts: ["技術創新領先","政府補貼支持的大規模產能投資","品牌差異化","利基市場聚焦"], ans: 1, exp: "BOE 依靠政府大量補貼進行大規模 LCD 產能投資，以壓倒性規模優勢壓低成本，侵蝕台韓廠商的市場。" }
    ],

    // M3
    m3_nav: "3. 賽局理論與競合策略",
    m3_title: "賽局理論與競合策略",
    m3_p1: "賽局理論克服了五力框架將競爭視為結構決定的靜態缺陷，允許我們將競爭建模為參與者之間的互動決策過程。它提供了兩大貢獻：一是幫助框定策略決策（識別參與者、選項、報酬、決策順序）；二是預測競爭結果並識別最優策略選擇。",
    m3_p2: "「所有商業關係都同時包含競爭與合作的元素。沒有純粹的競爭，也沒有純粹的合作。」——Brandenburger & Nalebuff 論競合策略",
    m3_p3: "賽局理論揭示了五種影響競爭結果的策略行為：合作（從零和走向正和）、嚇阻（施加對手不良行為的代價）、承諾（消除自身退路以增強可信度）、改變賽局結構（創造雙贏局面）、以及訊號傳遞（選擇性溝通影響對手感知）。PARTS 架構則將這些概念系統化為五個賽局要素：參與者（Players）、附加價值（Added Values）、規則（Rules）、戰術（Tactics）、範圍（Scope）。",
    m3_cards: [
      { title: "囚犯困境與合作均衡", desc: "兩家企業各自追求最大利益時，往往陷入雙輸局面（如廣告軍備競賽）。將一次性賽局轉為重複賽局，或透過嚇阻建立報復機制，可將均衡從背叛推向合作。" },
      { title: "硬承諾 vs. 軟承諾", desc: "硬承諾（如建新廠、銷毀船隻）信號激進意圖，在產量競爭中有利；軟承諾（如設定利潤目標）信號溫和意圖，在價格競爭中有利。承諾的效果取決於競爭模式。" }
    ],
    m3_case_title: "微個案：台灣航空業華航與長榮的競合賽局",
    m3_case: "華航（China Airlines）與長榮航空（EVA Air）自 1991 年長榮加入國際航線以來，便展開長達三十餘年的雙雄爭霸。這場賽局完美展現了競合（Co-opetition）的雙重性。在競爭面，兩家在台北—東京、台北—洛杉磯等黃金航線正面交鋒，航班時刻、票價、里程酬賓計畫全面較勁；長榮以服務品質著稱（連年獲 Skytrax 五星評等），華航則以航點網絡廣度與貨運能力見長。然而在合作面，雙方共同面對外部威脅時展現了默契：面對廉價航空（虎航、樂桃）的進攻，華航成立子公司台灣虎航、長榮則以星宇航空（張國煒創立，後脫離長榮體系）間接回應；在兩岸航線政策談判中，雙方對政府展現一致立場。疫情期間，兩家更協同調整航班、共享貨運能量。華航 2023 年加入天合聯盟（SkyTeam），長榮隸屬星空聯盟（Star Alliance），透過不同全球聯盟擴展網絡，既是差異化也是隱性的市場分工。",
    m3_case_lesson: "啟示：華航與長榮的案例體現了 Brandenburger & Nalebuff 的競合本質——在直接航線上激烈競爭，卻在產業政策、外部威脅應對、聯盟策略上形成互補與合作。雙方的存在實際上共同提升了台灣航空樞紐的整體價值。",
    m3_terms: [
      { front: "競合 Co-opetition", back: "Brandenburger & Nalebuff 提出：所有商業關係同時包含競爭與合作。企業應識別何時合作以創造價值（把餅做大），何時競爭以攫取價值（分餅）。" },
      { front: "囚犯困境 Prisoners' Dilemma", back: "經典賽局模型：兩名理性參與者追求個人最優時，卻陷入集體次優結果。在商業中表現為價格戰、廣告軍備競賽等雙輸局面。" },
      { front: "承諾 Commitment", back: "策略性地限制自身未來選項，以增強威脅或承諾的可信度。如 Cortés 燒船斷後路、Airbus 投入 A380 巨額廣告。關鍵在於使承諾「不可逆轉」。" }
    ],
    m3_q: [
      { q: "競合策略（Co-opetition）的核心理念是什麼？", opts: ["商業即戰爭，只有競爭","商業關係同時包含競爭與合作","只需合作，避免競爭","競爭與合作互斥"], ans: 1, exp: "Brandenburger & Nalebuff 指出所有商業關係都兼具競爭與合作——合作創造價值，競爭分配價值。" },
      { q: "囚犯困境中，如何將均衡從「雙方背叛」推向「雙方合作」？", opts: ["增加參與者數量","將一次性賽局轉為重複賽局，或建立嚇阻機制","降低報酬","改變參與者身份"], ans: 1, exp: "重複賽局讓參與者認識到持續背叛的長期代價，嚇阻則透過報復威脅改變背叛的短期報酬。" },
      { q: "華航與長榮的競合關係最能體現哪一概念？", opts: ["純粹競爭","純粹合作","競合的雙重性","壟斷"], ans: 2, exp: "兩家在航線上直接競爭，但在產業政策、外部威脅應對上展現合作，完美體現競合雙重性。" },
      { q: "PARTS 架構中的 A 代表什麼？", opts: ["行動（Action）","附加價值（Added Values）","聯盟（Alliance）","分析（Analysis）"], ans: 1, exp: "PARTS = Players（參與者）、Added Values（附加價值）、Rules（規則）、Tactics（戰術）、Scope（範圍）。" },
      { q: "硬承諾在哪種競爭模式下對承諾方有利？", opts: ["價格競爭","產量競爭","品質競爭","服務競爭"], ans: 1, exp: "在產量競爭（Cournot 模型）中，一方增產會迫使對手減產，因此建新廠等硬承諾有利於承諾方。" },
      { q: "訊號傳遞（Signaling）在策略中的主要功能是什麼？", opts: ["降低成本","影響競爭對手的感知與反應","提升產品品質","增加市場份額"], ans: 1, exp: "訊號傳遞是選擇性地溝通資訊以影響對手的感知，進而誘發或抑制特定類型的競爭反應。" },
      { q: "Tesla 於 2014 年開放其專利的策略可用什麼賽局概念解釋？", opts: ["囚犯困境","改變賽局結構以創造雙贏","嚇阻策略","退出壁壘"], ans: 1, exp: "Tesla 犧牲部分獨占優勢以擴大電動車市場規模、推動自身技術成為業界標準——典型的改變賽局結構策略。" },
      { q: "承諾（Commitment）策略的關鍵要素是什麼？", opts: ["靈活性","不可逆轉性","秘密性","漸進性"], ans: 1, exp: "承諾之所以有效，在於它是不可逆轉的——消除退路才能讓對手相信你會貫徹到底。" }
    ],

    // M4
    m4_nav: "4. 競爭者分析與競爭動態",
    m4_title: "競爭者分析與競爭動態",
    m4_p1: "在高度集中的產業中，企業的競爭環境主要由最近對手的行為所塑造。Porter 提出四構面競爭者分析框架：分析對手的現行策略、目標、產業假設、以及資源與能力，藉以預測其未來行為與對我方行動的反應。",
    m4_p2: "「偉大的將領——從漢尼拔到巴頓——的共同特質是能超越軍事情報，直接『進入對手指揮官的腦中思考』。」——Grant 論競爭者分析",
    m4_p3: "競爭動態的 AMC 模型從認知層面出發：企業的競爭行為取決於覺察（Awareness，是否察覺對手的行動）、動機（Motivation，是否有足夠理由回應）、能力（Capability，是否具備回應的資源）。市場共通性（M/C）越高，多點接觸（Multi-market Contact）帶來的相互克制（Mutual Forbearance）效應越強——發動攻擊的機率降低，但一旦被攻擊則回應機率上升。資源相似性（R/S）越高，企業越可能採取相似的策略與行為模式。",
    m4_cards: [
      { title: "Porter 四構面分析框架", desc: "（1）策略：對手如何競爭？（2）目標：追求市占還是獲利？（3）假設：對產業的認知與盲點為何？（4）資源與能力：強項與弱點在哪？四者結合可預測對手的行動與反應。" },
      { title: "AMC 競爭動態模型", desc: "市場共通性 × 資源相似性 → 競爭者分析 → 覺察 × 動機 × 能力 → 行動與回應 → 績效。行動分為策略性（高承諾、難逆轉）與戰術性（如價格調整），兩者引發的回應程度不同。" }
    ],
    m4_case_title: "微個案：台灣便利商店雙雄——7-ELEVEN 與全家的競爭動態",
    m4_case: "台灣便利商店密度全球第二，7-ELEVEN（統一超商，約 6,900 店）與全家（約 4,200 店）的競爭堪稱 AMC 模型的活教材。在市場共通性方面，兩者在全台都會區幾乎完全重疊，任何新門市都直接侵蝕對方的客源，多點接觸密度極高。在資源相似性方面，兩者都背靠大型企業集團（統一集團 vs. 全家日本+泰山），擁有相似的物流網絡、鮮食工廠、會員系統（OPEN POINT vs. 全家 App），策略行為模式高度趨同。從競爭動態來看，一方的創新往往快速引發對方的跟進回應：全家率先推出咖啡寄杯，7-ELEVEN 隨即跟進；7-ELEVEN 建構 OPEN POINT 生態圈，全家則以 App 零售媒體反攻。但在更高層面，雙方的「軍備競賽」（超商大型化、鮮食升級、數位支付整合）共同將便利商店從「賣東西的地方」轉型為「生活服務平台」，實質上擴大了整個產業的價值。",
    m4_case_lesson: "啟示：7-ELEVEN 與全家的案例展現了高市場共通性 × 高資源相似性下的競爭動態——覺察極高（密切監控對方的每一步棋）、動機強烈（寸土必爭）、能力對等（資源相當），形成快速的行動—回應循環，最終推動整個產業的持續升級。",
    m4_terms: [
      { front: "AMC 模型", back: "競爭動態的核心分析框架：Awareness（覺察）× Motivation（動機）× Capability（能力）。三者交互作用決定企業是否發動競爭行動及如何回應。" },
      { front: "市場共通性 Market Commonality", back: "兩家企業在產品市場上的重疊程度。共通性越高，多點接觸帶來的相互克制效應越強，但一旦被攻擊則回應越快越激烈。" },
      { front: "資源相似性 Resource Similarity", back: "兩家企業在資源與能力上的相似程度。相似性越高，越可能採取類似策略，對對手行動的回應能力也越強。" }
    ],
    m4_q: [
      { q: "Porter 競爭者分析的四個構面是什麼？", opts: ["SWOT 四要素","策略、目標、假設、資源與能力","價格、品質、服務、品牌","市場、產品、通路、促銷"], ans: 1, exp: "Porter 提出分析對手的現行策略、目標、對產業的假設、以及資源與能力，以預測其未來行為。" },
      { q: "AMC 模型中，M 代表什麼？", opts: ["市場（Market）","動機（Motivation）","管理（Management）","製造（Manufacturing）"], ans: 1, exp: "AMC = Awareness（覺察）、Motivation（動機）、Capability（能力），動機決定企業是否有足夠理由回應競爭行動。" },
      { q: "多點接觸（Multi-market Contact）會帶來什麼效應？", opts: ["增加攻擊頻率","相互克制（Mutual Forbearance）","降低競爭意識","消除競爭"], ans: 1, exp: "當兩家企業在多個市場相遇時，雙方傾向克制，因為在 A 市場的攻擊可能招致對方在 B 市場的報復。" },
      { q: "7-ELEVEN 與全家的競爭動態屬於 M/C 和 R/S 的哪種組合？", opts: ["高 M/C × 低 R/S","低 M/C × 高 R/S","高 M/C × 高 R/S","低 M/C × 低 R/S"], ans: 2, exp: "兩家在全台市場高度重疊（高 M/C），且資源組成極為相似（高 R/S），形成最激烈的競爭動態。" },
      { q: "以市占率為首要目標的企業相較於以獲利為目標的企業，在競爭中通常？", opts: ["更為保守","更具攻擊性","更傾向退出","行為相同"], ans: 1, exp: "Porter 指出追求市占率的企業（如 P&G、可口可樂）通常對對手的侵入反應更激烈，是更具攻擊性的競爭者。" },
      { q: "競爭情報（Competitive Intelligence）的三大目的不包括下列何者？", opts: ["預測競爭者未來策略","預測對手對我方行動的反應","操控對手內部決策","影響對手行為使其更有利"], ans: 2, exp: "競爭情報的三大目的是：預測對手策略、預測對手反應、影響對手行為。操控內部決策屬於非法行為。" },
      { q: "策略性行動與戰術性行動的主要差異是什麼？", opts: ["規模大小","承諾程度與可逆轉性","速度快慢","花費金額"], ans: 1, exp: "策略性行動（如建新工廠）涉及高度承諾且難以逆轉；戰術性行動（如價格調整）較為靈活可逆。" },
      { q: "「產業配方」（Industry Recipes）的概念揭示了什麼風險？", opts: ["企業過度創新","行業內管理者的認知趨同形成盲點","供應商壟斷","技術落後"], ans: 1, exp: "Spender 指出同業管理者的信念會趨同形成「產業配方」，可能造成全行業對外部威脅的集體盲點。" }
    ],

    // M5
    m5_nav: "5. 市場區隔與策略群組",
    m5_title: "市場區隔與策略群組",
    m5_p1: "要進行更精細的產業分析，必須將廣泛的產業拆解為更細緻的市場——這就是區隔分析。區隔的依據是客戶特性（人口統計、地理、購買行為）與產品特性（價格、功能、技術設計），目的是找出替代性限制最大的市場界線。",
    m5_p2: "「選擇服務哪些客戶、提供什麼產品——這就是區隔決策的本質，也是策略定位的起點。」——Grant",
    m5_p3: "策略群組分析則從企業策略面切入：在同一產業中，採取類似策略（如產品範圍、地理佈局、品質定位、通路選擇）的企業構成一個策略群組。群組之間的利潤差異受「移動障礙」（Mobility Barriers）保護——這是群組層級的進入障礙。Bain & Company 的利潤池（Profit Pool）分析則提供垂直區隔視角，識別價值鏈中哪些環節最具獲利潛力。",
    m5_cards: [
      { title: "區隔分析五步驟", desc: "（1）辨識關鍵區隔變數 →（2）建構區隔矩陣 →（3）分析各區隔吸引力（五力應用於區隔層級）→（4）辨識各區隔的關鍵成功因素 →（5）選擇區隔範圍——廣泛或聚焦。" },
      { title: "藍海策略的定位意涵", desc: "Kim & Mauborgne 的藍海策略本質上是區隔分析的延伸——找到未被服務（或服務不足）的市場區隔，如 Nintendo Wii 瞄準休閒玩家、Walmart 深耕小城鎮折扣零售。" }
    ],
    m5_case_title: "微個案：台灣電動機車——Gogoro vs. 光陽的策略群組對決",
    m5_case: "台灣電動機車市場可清楚劃分為不同的策略群組。Gogoro（睿能創意）以「科技公司」自居，核心策略是建立換電網路平台生態系——投入近 5 億美元建置全台超過 2,500 座 GoStation 換電站，並以 PBGN（Powered by Gogoro Network）開放聯盟吸引 YAMAHA、宏佳騰、PGO 等車廠加入，目標是成為「電動機車界的 Android」。2024 年 Gogoro 聯盟以逾 52,000 輛銷量、超過 65% 電動機車市占率穩居龍頭。光陽（KYMCO）則以「傳統車廠轉型」路線回應，2020 年推出 Ionex 3.0 換電系統自建能源網絡，至 2024 年已達 3,000 座換電站，全年銷售約 17,700 輛電動機車，換電系統達損益兩平。光陽強調「充換電並行」的彈性、更親民的定價，以及對全球商用市場（物流、共享）的佈局。兩者的策略差異形成明確的移動障礙：Gogoro 的壁壘在於龐大的換電網絡基礎設施與生態系鎖定效應；光陽的壁壘在於品牌通路、全球經銷網絡與 30 年的製造經驗。值得注意的是，台灣能同時發展出兩套獨立的換電系統並維持商業運作，在全球二輪電動車市場中極為罕見。",
    m5_case_lesson: "啟示：Gogoro 與光陽代表兩個截然不同的策略群組——平台生態系 vs. 傳統車廠轉型，各自的移動障礙保護了彼此的利基。從產業整體來看，雙方的競爭共同推動了台灣電動機車供應鏈的成熟，也讓台灣成為全球二輪電動化的技術領先者。",
    m5_terms: [
      { front: "策略群組 Strategic Group", back: "產業中採取相同或相似策略的企業群體。群組間受移動障礙保護，不同群組可能有不同的獲利水平。" },
      { front: "移動障礙 Mobility Barriers", back: "阻止企業從一個策略群組移動到另一個策略群組的因素。是產業層級「進入障礙」在群組層級的對應概念。" },
      { front: "利潤池 Profit Pool", back: "Bain & Company 提出的垂直區隔分析工具，將產業價值鏈的各環節按照營收占比與利潤率繪製，識別最具獲利潛力的環節。" }
    ],
    m5_q: [
      { q: "區隔分析的起點是什麼？", opts: ["分析競爭者","辨識關鍵區隔變數","計算市場規模","進行 SWOT 分析"], ans: 1, exp: "區隔分析的第一步是辨識最能劃分市場的關鍵變數（客戶特性與產品特性），再據此建構區隔矩陣。" },
      { q: "策略群組之間的利潤差異受什麼保護？", opts: ["政府法規","移動障礙","品牌忠誠","技術專利"], ans: 1, exp: "移動障礙是群組間的「進入障礙」，使某些策略群組能維持較高獲利水平，其他群組不易模仿。" },
      { q: "Gogoro 的核心策略定位最接近哪種角色？", opts: ["傳統車廠","換電平台生態系營運商","零件供應商","共享經濟公司"], ans: 1, exp: "Gogoro 自定位為「能源管理科技公司」，核心價值在於 GoStation 換電平台與 PBGN 開放聯盟生態系。" },
      { q: "光陽在電動機車市場的主要移動障礙是什麼？", opts: ["換電網絡規模","品牌通路、全球經銷網與製造經驗","政府補貼","App 會員數"], ans: 1, exp: "光陽的壁壘在於 30 年積累的品牌通路、全球經銷網絡與製造經驗，這些是新進者難以快速複製的。" },
      { q: "藍海策略與區隔分析的關聯是什麼？", opts: ["完全無關","藍海策略本質上是找到未被服務的市場區隔","藍海策略取代了區隔分析","藍海策略只適用於科技業"], ans: 1, exp: "Kim & Mauborgne 的藍海策略可理解為區隔分析的延伸——識別並開拓未被服務或服務不足的市場空間。" },
      { q: "利潤池分析的主要用途是什麼？", opts: ["評估員工績效","識別價值鏈中最具獲利潛力的環節","計算市場佔有率","預測股價走勢"], ans: 1, exp: "利潤池分析將價值鏈各環節的營收占比與利潤率可視化，幫助企業識別應聚焦的高獲利環節。" },
      { q: "在策略群組分析中，以下何者通常不是策略維度？", opts: ["產品範圍","地理佈局","員工年齡分佈","品質定位"], ans: 2, exp: "常用的策略維度包括產品範圍、地理佈局、品質定位、通路選擇、垂直整合程度等，員工年齡並非策略維度。" },
      { q: "2024 年台灣電動機車市場中，Gogoro 聯盟的市占率約為多少？", opts: ["約 30%","約 45%","超過 65%","約 80%"], ans: 2, exp: "2024 年 Gogoro 聯盟以逾 52,000 輛銷量，在台灣電動機車市場取得超過 65% 的市占率。" }
    ],

    m1_nav: "1. Five Forces & Complements",
    m1_title: "Extending Five Forces & Complements",
    m1_p1: "While Porter's Five Forces is the most widely used strategy analysis tool, it faces two major criticisms: theoretically, its Structure-Conduct-Performance (S-C-P) foundation lacks rigor compared to game theory; empirically, industry factors explain less than 20% of inter-firm profitability differences—firm-specific resources and capabilities matter more.",
    m1_p2: "\"Complements increase the value of a product: without ink cartridges, my printer is useless. Our competitive analysis must account for them—a missing force in the Porter model.\" — Grant",
    m1_p3: "Brandenburger and Nalebuff proposed the Value Net framework, adding complementors: their products make yours more valuable, while substitutors do the opposite. In digital markets, complementary relationships between hardware, OS, and apps create network externalities, leading to winner-takes-all dynamics.",
    m1_cards: [
      { title: "Strategic Logic of Complements", desc: "Pursue monopolization, differentiation, and scarcity in your own product; simultaneously encourage competition, commoditization, and excess capacity in complementary products, transferring value to yourself." },
      { title: "Platform Competition & Winner-Takes-All", desc: "In digital markets, users and developers gravitate toward the leading platform (network externalities), creating self-reinforcing cycles. Android grew from 37% (2011) to 84% (2014) market share." }
    ],
    m1_case_title: "Micro-Case: TSMC OIP Ecosystem — Complement Value Co-Creation",
    m1_case: "TSMC established the Open Innovation Platform (OIP) in 2008, bringing together EDA vendors (Synopsys, Cadence, Siemens EDA), IP providers, and cloud partners (AWS, Azure, Google Cloud) to form the semiconductor industry's most powerful design ecosystem. The core logic is complement strategy: TSMC opens process parameters to enable deep EDA optimization for its nodes, helping IC design customers achieve 'first-time-right' tapeouts. This reduces switching incentives to competitors (Samsung, Intel), as the entire complement ecosystem is deeply tied to TSMC's processes. TSMC doesn't compete with customers (pure foundry model) but becomes the irreplaceable bottleneck by controlling the integration interface. Today OIP includes 16+ EDA partners, 39+ IP partners, and over 35,000 silicon IP items—a moat competitors cannot replicate.",
    m1_case_lesson: "Insight: TSMC perfectly illustrates complement strategy: build an irreplaceable monopoly in your own domain (advanced process) while fostering competition in complement markets through an open platform, so ecosystem value flows back to you.",
    m1_terms: [
      { front: "Complements", back: "Products/services that increase the value of another product. E.g., EDA software for foundry services, apps for smartphone OS. Complement availability directly affects core product competitiveness." },
      { front: "Value Net", back: "Framework by Brandenburger & Nalebuff placing the firm at the center of customers, suppliers, competitors, and complementors—supplementing Porter's neglect of complementary relationships." },
      { front: "Network Externality", back: "When a product's value to users increases with the number of other users. Creates positive feedback loops in platform markets, driving winner-takes-all outcomes." }
    ],
    m1_q: [
      { q: "Research shows industry factors explain approximately what % of inter-firm profit variance?", opts: ["Over 50%","About 30-40%","Less than 20%","About 80%"], ans: 2, exp: "Multiple studies (Rumelt, McGahan & Porter, etc.) consistently show industry factors explain less than 20% of ROA variance." },
      { q: "What is the key difference between complements and substitutes?", opts: ["Complements decrease value, substitutes increase","Complements increase value, substitutes decrease","Both have the same effect","Complements exist only in digital industries"], ans: 1, exp: "Complements make products more valuable (phones & apps), while substitutes reduce value (streaming vs. cable TV)." },
      { q: "TSMC's OIP ecosystem represents which complement strategy?", opts: ["Closed integration","Open platform fostering complement competition","Price war","Vertical integration"], ans: 1, exp: "TSMC opens process info to promote EDA/IP competition and optimization, channeling ecosystem value back to itself." },
      { q: "In complement strategy, how should firms treat complement markets?", opts: ["Monopolize them","Encourage competition and commoditization","Ignore them","Restrict supply"], ans: 1, exp: "The strategic logic: monopolize your product while encouraging complement market competition—value flows to the bottleneck controller." },
      { q: "Why do network externalities lead to winner-takes-all?", opts: ["Government regulations","Product value increases with users, creating positive feedback","Tech barriers too high","High consumer loyalty"], ans: 1, exp: "More users attract more developers/complements, attracting more users—a self-reinforcing cycle where the leader captures most profits." },
      { q: "Who proposed the Value Net framework?", opts: ["Michael Porter","Joseph Schumpeter","Brandenburger & Nalebuff","Clay Christensen"], ans: 2, exp: "Adam Brandenburger and Barry Nalebuff proposed the Value Net in 'Co-opetition,' addressing Porter's neglect of complements." },
      { q: "What was the key factor in Android's smartphone platform victory?", opts: ["Best hardware quality","Open-source & free, attracting manufacturers and developers","Apple exited the market","Government subsidies"], ans: 1, exp: "Android's open-source strategy attracted 50+ manufacturers and a massive app ecosystem, leveraging network externalities." },
      { q: "How many EDA partners does TSMC's OIP currently have?", opts: ["3","16","50","100"], ans: 1, exp: "TSMC OIP includes ~16 EDA partners plus IP and cloud partners, forming the industry's most complete design ecosystem." }
    ],

    m2_nav: "2. Dynamic Competition",
    m2_title: "Dynamic Competition & Hypercompetition",
    m2_p1: "Joseph Schumpeter viewed competition as a 'perennial gale of creative destruction': market leaders are constantly challenged and often displaced by rivals' innovations. This contrasts with Porter's Five Forces treating industry structure as a stable determinant—if structural change is rapid, the framework offers no stable analytical basis.",
    m2_p2: "\"Intense and rapid competitive moves, in which competitors must move quickly to build new advantages and erode rivals' advantages.\" — Richard D'Aveni on Hypercompetition",
    m2_p3: "D'Aveni's hypercompetition and McGrath's 'transient advantage' argue competitive advantage is no longer durable—firms must continuously create series of short-term advantages. However, empirical evidence is mixed: some studies confirm increasing volatility in US manufacturing since 1950, while others find no widespread evidence of greater instability.",
    m2_cards: [
      { title: "Industry Lifecycle & Competitive Evolution", desc: "From embryonic (tech competition, few firms) → growth (capacity shortage, standardization) → shakeout (consolidation) → maturity (overcapacity, commoditization) → decline (price wars, exit). KSFs differ dramatically at each stage." },
      { title: "Digital Age Impact on Five Forces", desc: "Internet lowers entry barriers (more entrants), reduces switching costs (buyer power up), increases substitution opportunities, and online competition weakens differentiation while focusing on price—negatively impacting structural attractiveness." }
    ],
    m2_case_title: "Micro-Case: Taiwan's Display Industry — Creative Destruction's Brutal Reshuffling",
    m2_case: "Taiwan's display panel industry experienced rapid growth in the early 2000s, with AU Optronics and Chi Mei (later merged into Innolux) rivaling Samsung and LG. But this industry perfectly exemplifies hypercompetition: rapid technology generational shifts (TFT-LCD to OLED to Mini/Micro LED), massive capex creating overcapacity, and cyclical price crashes. After the 2008 financial crisis, Taiwan's 'Big Two' suffered years of losses, forcing Chi Mei's merger with Innolux. Korean firms pivoted to OLED, building new tech barriers; China's BOE leveraged government subsidies for overwhelming LCD capacity. Taiwan panels' tech and scale advantages eroded within a decade. Recently, Taiwan firms are pivoting to high-value niches like Mini LED and Micro LED.",
    m2_case_lesson: "Insight: The display industry's rise and fall validates Schumpeter's creative destruction and D'Aveni's hypercompetition—in rapidly iterating tech industries, today's leader may be tomorrow's follower. Continuous innovation investment and agile strategic pivots are survival necessities.",
    m2_terms: [
      { front: "Creative Destruction", back: "Schumpeter's concept: competition is a dynamic innovation process where market leaders are constantly challenged and displaced by rivals' innovations, driving continuous industry structural change." },
      { front: "Hypercompetition", back: "D'Aveni's concept: intense, rapid competitive moves render advantages temporary. Firms must continuously create new advantages and erode rivals' advantages to maintain position." },
      { front: "Transient Advantage", back: "McGrath's argument: in dynamic environments, sustainable competitive advantage is the exception, not the norm. Strategy should focus on continuously creating series of short-term advantages." }
    ],
    m2_q: [
      { q: "How did Schumpeter characterize competition?", opts: ["A stable equilibrium","A perennial gale of creative destruction","A zero-sum game","A perfectly competitive market"], ans: 1, exp: "Schumpeter saw competition as continuous innovation and destruction, with incumbents constantly challenged by newcomers' innovations." },
      { q: "What is the core claim of hypercompetition?", opts: ["Industry structure is stable","Competitive advantage is durable","Advantage is temporary; firms must continuously create new ones","Only large firms survive"], ans: 2, exp: "D'Aveni argues advantages are fleeting in hypercompetitive environments—firms must constantly act and build new advantages." },
      { q: "What is the KSF during industry maturity?", opts: ["Product innovation","Cost efficiency and scale economies","R&D investment","Brand building"], ans: 1, exp: "During maturity, markets commoditize and competition focuses on cost efficiency (economies of scale, low-cost inputs)." },
      { q: "What is the main directional impact of digitization on Five Forces?", opts: ["Universally improves attractiveness","Lowers entry barriers, increases substitutes, weakens differentiation","Eliminates competition","Only affects tech industries"], ans: 1, exp: "Internet lowers barriers, improves buyer information, increases substitutes, and makes price the primary competitive dimension." },
      { q: "Taiwan's display decline best illustrates which theoretical concept?", opts: ["Five Forces stability analysis","Creative destruction and hypercompetition","Perfect competition","Resource-based view"], ans: 1, exp: "Rapid tech iteration, overcapacity, and cyclical price crashes perfectly illustrate Schumpeter's and D'Aveni's dynamic competition views." },
      { q: "How should strategy adapt under McGrath's 'transient advantage' view?", opts: ["Pursue single durable advantage","Continuously create series of short-term advantages","Avoid all competition","Only defend, never attack"], ans: 1, exp: "McGrath argues firms should manage 'advantage portfolios,' continuously launching and retiring different advantage cycles." },
      { q: "What typically happens during the industry 'shakeout' phase?", opts: ["Many new entrants join","Weak firms are eliminated through consolidation","Technology flourishes","Demand grows rapidly"], ans: 1, exp: "Shakeout follows slowing growth—firms unable to achieve scale or differentiation are forced to exit or be acquired." },
      { q: "What was BOE's (China) primary competitive strategy in display panels?", opts: ["Technology leadership","Government-subsidized massive capacity investment","Brand differentiation","Niche market focus"], ans: 1, exp: "BOE leveraged massive government subsidies for LCD capacity investment, achieving overwhelming scale advantage to undercut Taiwan/Korea rivals." }
    ],

    m3_nav: "3. Game Theory & Co-opetition",
    m3_title: "Game Theory & Co-opetition",
    m3_p1: "Game theory overcomes Five Forces' static treatment of competition as structure-determined, modeling competition as interactive decision-making. Two key contributions: framing strategic decisions (identifying players, options, payoffs, sequencing) and predicting competitive outcomes while identifying optimal strategies.",
    m3_p2: "\"All business relationships combine elements of both competition and cooperation. There is no simple dichotomy.\" — Brandenburger & Nalebuff on Co-opetition",
    m3_p3: "Game theory reveals five strategic behaviors: cooperation (from zero-sum to positive-sum), deterrence (imposing costs on rivals' undesirable actions), commitment (eliminating options to enhance credibility), changing game structure (creating win-win outcomes), and signaling (selective communication to influence perceptions). The PARTS framework systematizes these into five game elements: Players, Added Values, Rules, Tactics, and Scope.",
    m3_cards: [
      { title: "Prisoners' Dilemma & Cooperative Equilibria", desc: "When firms individually maximize, they often reach lose-lose outcomes (e.g., advertising arms races). Converting one-shot to repeated games, or establishing deterrence via retaliation mechanisms, can shift equilibrium from defection to cooperation." },
      { title: "Hard vs. Soft Commitments", desc: "Hard commitments (building plants, burning ships) signal aggressive intent—beneficial under quantity competition. Soft commitments (profit targets) signal moderation—beneficial under price competition. Effectiveness depends on competitive mode." }
    ],
    m3_case_title: "Micro-Case: Taiwan Airlines — China Airlines & EVA Air's Co-opetitive Game",
    m3_case: "China Airlines and EVA Air have competed since EVA entered international routes in 1991, a three-decade duopoly perfectly demonstrating co-opetition. Competitively, they clash on premium routes (Taipei-Tokyo, Taipei-LA) across schedules, pricing, and loyalty programs; EVA excels in service quality (Skytrax 5-star), while China Airlines leads in network breadth and cargo. Cooperatively, they align against external threats: both responded to LCCs (Tigerair, Peach) differently, and during pandemic aligned on capacity and cargo sharing. China Airlines joined SkyTeam, EVA belongs to Star Alliance—different global alliances represent both differentiation and implicit market division.",
    m3_case_lesson: "Insight: China Airlines and EVA embody Brandenburger & Nalebuff's co-opetition essence—fierce competition on direct routes, yet cooperation on industry policy, external threat response, and alliance strategy. Both airlines' existence collectively enhances Taiwan's aviation hub value.",
    m3_terms: [
      { front: "Co-opetition", back: "Brandenburger & Nalebuff's concept: all business relationships combine competition and cooperation. Firms should cooperate to create value (grow the pie) and compete to capture value (divide it)." },
      { front: "Prisoners' Dilemma", back: "Classic game model: two rational players pursuing individual optima reach a collectively suboptimal outcome. In business: price wars, advertising arms races, and other lose-lose dynamics." },
      { front: "Commitment", back: "Strategically eliminating future options to enhance threat/promise credibility. E.g., Cortés burning ships, Airbus's heavy A380 advertising pre-design. Key: making it irreversible." }
    ],
    m3_q: [
      { q: "What is the core idea of co-opetition?", opts: ["Business is war—only competition","Business relationships combine competition and cooperation","Only cooperate, avoid competition","Competition and cooperation are mutually exclusive"], ans: 1, exp: "Brandenburger & Nalebuff argue all business relationships have both elements—cooperate to create value, compete to capture it." },
      { q: "How can the prisoners' dilemma equilibrium shift from 'both defect' to 'both cooperate'?", opts: ["Add more players","Convert to repeated game or establish deterrence","Reduce payoffs","Change player identities"], ans: 1, exp: "Repeated games reveal long-term costs of defection; deterrence changes short-term payoffs through retaliation threats." },
      { q: "China Airlines and EVA Air best illustrate which concept?", opts: ["Pure competition","Pure cooperation","Co-opetition duality","Monopoly"], ans: 2, exp: "They compete fiercely on routes but cooperate on industry policy and external threat response—perfect co-opetition duality." },
      { q: "What does the 'A' in PARTS represent?", opts: ["Action","Added Values","Alliance","Analysis"], ans: 1, exp: "PARTS = Players, Added Values, Rules, Tactics, Scope." },
      { q: "Under which competitive mode are hard commitments beneficial?", opts: ["Price competition","Quantity competition","Quality competition","Service competition"], ans: 1, exp: "In quantity competition (Cournot model), one firm's output increase forces rivals to reduce output—hard commitments like new plants benefit the committer." },
      { q: "What is the primary function of signaling in strategy?", opts: ["Cost reduction","Influencing competitors' perceptions and responses","Improving product quality","Increasing market share"], ans: 1, exp: "Signaling selectively communicates information to influence rivals' perceptions, inducing or suppressing specific competitive responses." },
      { q: "Tesla's 2014 patent release can be explained by which game concept?", opts: ["Prisoners' dilemma","Changing game structure to create win-win","Deterrence strategy","Exit barriers"], ans: 1, exp: "Tesla sacrificed some exclusivity to expand the EV market and promote its technology as industry standard—classic game structure change." },
      { q: "What is the key element of commitment strategy?", opts: ["Flexibility","Irreversibility","Secrecy","Gradualism"], ans: 1, exp: "Commitment works because it's irreversible—eliminating retreat options is what makes rivals believe you'll follow through." }
    ],

    m4_nav: "4. Competitor Analysis",
    m4_title: "Competitor Analysis & Competitive Dynamics",
    m4_p1: "In highly concentrated industries, a firm's competitive environment is primarily shaped by its closest rivals' behavior. Porter proposes a four-component competitor analysis framework: current strategy, objectives, industry assumptions, and resources & capabilities—to predict future behavior and responses to our initiatives.",
    m4_p2: "\"Great generals—from Hannibal to Patton—shared the ability to go beyond military intelligence and 'get inside the heads' of opposing commanders.\" — Grant on Competitor Analysis",
    m4_p3: "The AMC model approaches from cognition: competitive behavior depends on Awareness (detecting rival actions), Motivation (sufficient reason to respond), and Capability (resources to respond). Higher Market Commonality (M/C) creates multi-market contact and mutual forbearance—reducing attack probability but increasing response likelihood when attacked. Higher Resource Similarity (R/S) means similar strategies and behavioral patterns.",
    m4_cards: [
      { title: "Porter's 4-Component Framework", desc: "(1) Strategy: How does the rival compete? (2) Objectives: Market share or profitability driven? (3) Assumptions: Industry beliefs and blindspots? (4) Resources & Capabilities: Strengths and weaknesses? Combined, these predict rival actions and reactions." },
      { title: "AMC Competitive Dynamics Model", desc: "Market Commonality × Resource Similarity → Competitor Analysis → Awareness × Motivation × Capability → Action & Response → Performance. Actions are strategic (high-commitment, hard-to-reverse) or tactical (e.g., price adjustments), eliciting different response levels." }
    ],
    m4_case_title: "Micro-Case: Taiwan CVS Duopoly — 7-ELEVEN & FamilyMart's Competitive Dynamics",
    m4_case: "Taiwan has the world's 2nd-highest convenience store density. 7-ELEVEN (~6,900 stores) and FamilyMart (~4,200 stores) provide a living AMC textbook. Market Commonality: near-complete overlap in urban areas—every new store directly encroaches on the rival. Resource Similarity: both backed by major groups (Uni-President vs. FamilyMart Japan+Taishan), with similar logistics, fresh food factories, and membership systems (OPEN POINT vs. FamilyMart App). Competitive dynamics show rapid action-response cycles: FamilyMart pioneered coffee pre-ordering, 7-ELEVEN quickly followed; 7-ELEVEN built the OPEN POINT ecosystem, FamilyMart counter-attacked with App retail media. At a higher level, their 'arms race' (larger stores, food upgrades, digital payment integration) jointly transformed CVS from 'stores that sell things' into 'life service platforms,' expanding overall industry value.",
    m4_case_lesson: "Insight: 7-ELEVEN and FamilyMart demonstrate high M/C × high R/S competitive dynamics—extremely high awareness (monitoring every rival move), strong motivation (fighting for every inch), and matched capability (equivalent resources), creating rapid action-response cycles that continuously upgrade the entire industry.",
    m4_terms: [
      { front: "AMC Model", back: "Core competitive dynamics framework: Awareness × Motivation × Capability. Their interaction determines whether firms launch competitive actions and how they respond." },
      { front: "Market Commonality", back: "The degree of overlap between two firms in product markets. Higher commonality creates mutual forbearance through multi-market contact, but faster/fiercer responses when attacked." },
      { front: "Resource Similarity", back: "The degree of similarity in two firms' resources and capabilities. Higher similarity leads to similar strategies and stronger response capability to rival actions." }
    ],
    m4_q: [
      { q: "What are Porter's four components of competitor analysis?", opts: ["SWOT elements","Strategy, objectives, assumptions, resources & capabilities","Price, quality, service, brand","Market, product, channel, promotion"], ans: 1, exp: "Porter proposes analyzing rival's current strategy, objectives, industry assumptions, and resources & capabilities to predict behavior." },
      { q: "What does M stand for in the AMC model?", opts: ["Market","Motivation","Management","Manufacturing"], ans: 1, exp: "AMC = Awareness, Motivation, Capability. Motivation determines whether firms have sufficient reason to respond." },
      { q: "What effect does multi-market contact create?", opts: ["Increased attack frequency","Mutual forbearance","Reduced awareness","Competition elimination"], ans: 1, exp: "When firms meet in multiple markets, both tend toward restraint—attacks in market A may invite retaliation in market B." },
      { q: "7-ELEVEN vs. FamilyMart represents which M/C and R/S combination?", opts: ["High M/C × Low R/S","Low M/C × High R/S","High M/C × High R/S","Low M/C × Low R/S"], ans: 2, exp: "Both overlap heavily nationwide (high M/C) with very similar resource compositions (high R/S)—the most intense competitive dynamic." },
      { q: "Compared to profit-focused firms, market-share-focused firms typically are:", opts: ["More conservative","More aggressive","More likely to exit","Identical in behavior"], ans: 1, exp: "Porter notes share-driven firms (P&G, Coca-Cola) react more aggressively to encroachment—they are fiercer competitors." },
      { q: "Which is NOT a purpose of competitive intelligence?", opts: ["Predict rival future strategies","Predict rival responses to our moves","Manipulate rival internal decisions","Influence rival behavior favorably"], ans: 2, exp: "Three purposes: predict strategies, predict responses, influence behavior. Manipulating internal decisions is illegal." },
      { q: "What mainly distinguishes strategic from tactical actions?", opts: ["Size difference","Commitment level and reversibility","Speed difference","Cost amount"], ans: 1, exp: "Strategic actions (building plants) involve high commitment and irreversibility; tactical actions (pricing) are more flexible and reversible." },
      { q: "What risk does 'industry recipes' concept reveal?", opts: ["Over-innovation","Cognitive convergence among managers creating blindspots","Supplier monopoly","Tech obsolescence"], ans: 1, exp: "Spender noted industry managers' beliefs converge into 'recipes,' potentially creating collective blindspots to external threats." }
    ],

    m5_nav: "5. Segmentation & Strategic Groups",
    m5_title: "Segmentation & Strategic Groups",
    m5_p1: "For finer industry analysis, broad industries must be disaggregated into more specific markets—this is segmentation analysis. Segmentation bases are customer characteristics (demographics, geography, behavior) and product characteristics (price, features, technology), aiming to find market boundaries where substitution is most limited.",
    m5_p2: "\"Choosing which customers to serve and what to offer them—this is the essence of segmentation decisions, and the starting point of strategic positioning.\" — Grant",
    m5_p3: "Strategic group analysis segments from the strategy side: firms in an industry following similar strategies (product range, geography, quality, channels) form a strategic group. Profitability differences between groups are protected by mobility barriers—group-level entry barriers. Bain's profit pool analysis provides vertical segmentation, identifying which value chain activities are most profitable.",

      { title: "Blue Ocean Strategy's Segmentation Implication", desc: "Kim & Mauborgne's Blue Ocean is essentially extended segmentation—finding unserved or underserved segments. Nintendo Wii targeted casual gamers, Walmart focused on small-town discount retail." }

    <div className="perspective cursor-pointer h-36" onClick={() => setFlipped(!flipped)}>

const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() => [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4));
  const handleSubmit = () => {
    if (Object.keys(selected).length < quizIndices.length) return;
    const c = quizIndices.filter((qIdx, i) => selected[i] === questions[qIdx].ans).length;
    setSubmitted(true);
    onQuizSubmit(moduleId, c, quizIndices.length);
  };
  const correctCount = submitted ? quizIndices.filter((qIdx, i) => selected[i] === questions[qIdx].ans).length : 0;
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-xl text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center"><IconBookOpen size={20} className="mr-2"/>{t.quiz_title}</h3>
      {quizIndices.map((qIdx, qi) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-semibold text-slate-800 dark:text-slate-200 mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">{q.opts.map((opt, oi) => {
              let cls = "w-full text-left px-4 py-2.5 rounded-lg border text-sm transition-colors ";
              if (!submitted) cls += selected[qi] === oi ? "border-[#004030] bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] font-semibold" : "border-slate-200 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300";
              else if (oi === q.ans) cls += "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-semibold";
              else if (selected[qi] === oi) cls += "border-red-400 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400";
              else cls += "border-slate-200 dark:border-slate-600 text-slate-500";
              return <button key={oi} onClick={() => !submitted && setSelected(s=>({...s,[qi]:oi}))} className={cls}>{opt}</button>;
            })}</div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}：{q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={handleSubmit} disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors">{t.submit}</button>
      ) : (
        <div className="flex items-center space-x-4">
          <span className="font-bold text-lg text-[#004030] dark:text-[#D8C3A5]">{t.score}：{correctCount}/{quizIndices.length}</span>
          <button onClick={() => { setSelected({}); setSubmitted(false); }} className="px-4 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] rounded-lg hover:bg-[#004030]/10 text-sm font-semibold transition-colors">{t.retry}</button>
        </div>
      )}
    </div>
  );
};

const FiveForcesPlusLab = ({lang}) => {
  const [complement, setComplement] = useState(50);
  const forces = [{name:lang==='zh'?'新進入者威脅':'Threat of Entry',val:60},{name:lang==='zh'?'供應商議價力':'Supplier Power',val:45},{name:lang==='zh'?'買方議價力':'Buyer Power',val:55},{name:lang==='zh'?'替代品威脅':'Substitutes',val:70},{name:lang==='zh'?'同業競爭':'Rivalry',val:80}];
  const total = forces.reduce((s,f)=>s+f.val,0) + complement;
  const attractiveness = Math.max(0, 100 - total/6);
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'五力 +1 互動模擬器':'Five Forces +1 Simulator'}</h4>
      <div className="space-y-3">
        {forces.map((f,i)=>(
          <div key={i} className="flex items-center gap-3">
            <span className="text-xs w-24 shrink-0">{f.name}</span>
            <div className="flex-1 bg-slate-200 dark:bg-slate-700 rounded-full h-4"><div className="bg-red-400 h-4 rounded-full transition-all" style={{width:`${f.val}%`}}/></div>
            <span className="text-xs w-8 text-right">{f.val}</span>
          </div>
        ))}
        <div className="flex items-center gap-3">
          <span className="text-xs w-24 shrink-0 text-green-600 font-bold">{lang==='zh'?'互補品價值':'Complement Value'}</span>
          <input type="range" min="0" max="100" value={complement} onChange={e=>setComplement(+e.target.value)} className="flex-1 accent-green-500"/>
          <span className="text-xs w-8 text-right text-green-600">{complement}</span>
        </div>
      </div>
      <div className="mt-4 p-3 bg-slate-100 dark:bg-slate-700 rounded-lg text-center">
        <p className="text-sm">{lang==='zh'?'產業吸引力指數':'Industry Attractiveness'}: <span className="font-bold text-lg text-[#004030] dark:text-[#D8C3A5]">{attractiveness.toFixed(0)}/100</span></p>
        <p className="text-xs text-slate-500 mt-1">{lang==='zh'?'↑ 提升互補品價值可改善產業吸引力':'↑ Increasing complement value improves attractiveness'}</p>
      </div>
    </div>
  );
};

const PrisonersDilemmaLab = ({lang}) => {
  const [p1, setP1] = useState(null);
  const [p2, setP2] = useState(null);
  const payoffs = {cc:[15,15],cd:[-2,20],dc:[20,-2],dd:[4,4]};
  const key = p1 && p2 ? p1+p2 : null;
  const labels = lang==='zh' ? {c:'小額廣告',d:'大額廣告'} : {c:'Small Budget',d:'Big Budget'};
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'囚犯困境模擬':'Prisoners\' Dilemma Simulator'}</h4>
      <div className="grid grid-cols-2 gap-4 mb-4">
        <div><p className="text-sm font-bold mb-2">{lang==='zh'?'企業 A 選擇：':'Firm A:'}</p>
          <div className="space-y-2">{['c','d'].map(v=><button key={v} onClick={()=>setP1(v)} className={`w-full px-3 py-2 rounded-lg border text-sm ${p1===v?'bg-[#004030] text-white border-[#004030]':'border-slate-300 dark:border-slate-600'}`}>{labels[v]}</button>)}</div>
        </div>
        <div><p className="text-sm font-bold mb-2">{lang==='zh'?'企業 B 選擇：':'Firm B:'}</p>
          <div className="space-y-2">{['c','d'].map(v=><button key={v} onClick={()=>setP2(v)} className={`w-full px-3 py-2 rounded-lg border text-sm ${p2===v?'bg-[#004030] text-white border-[#004030]':'border-slate-300 dark:border-slate-600'}`}>{labels[v]}</button>)}</div>
        </div>
      </div>
      {key && <div className="p-4 bg-slate-100 dark:bg-slate-700 rounded-lg text-center">
        <p className="text-sm">{lang==='zh'?'報酬結果（百萬美元）':'Payoff ($ millions)'}:</p>
        <p className="text-xl font-bold mt-1">A: <span className={payoffs[key][0]>=10?'text-green-600':'text-red-500'}>${payoffs[key][0]}M</span> · B: <span className={payoffs[key][1]>=10?'text-green-600':'text-red-500'}>${payoffs[key][1]}M</span></p>
        <p className="text-xs text-slate-500 mt-2">{key==='cc'?(lang==='zh'?'雙方合作——帕累托最優！':'Mutual cooperation — Pareto optimal!'):key==='dd'?(lang==='zh'?'雙方背叛——囚犯困境的 Nash 均衡':'Mutual defection — Nash equilibrium'):(lang==='zh'?'一方得利，一方受損':'One gains, one loses')}</p>
      </div>}
    </div>
  );
};

const AMCLab = ({lang}) => {
  const [mc, setMc] = useState(50);
  const [rs, setRs] = useState(50);
  const rivalry = Math.min(100, Math.round((mc*0.4+rs*0.4+mc*rs/200)));
  const awareness = Math.min(100,Math.round(mc*0.7+rs*0.3));
  const motivation = Math.min(100,Math.round(mc*0.5+rs*0.5));
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'AMC 競爭動態模擬':'AMC Dynamics Simulator'}</h4>
      <div className="space-y-4">
        <div><label className="text-sm font-bold">{lang==='zh'?'市場共通性 (M/C)':'Market Commonality (M/C)'}: {mc}%</label>
          <input type="range" min="0" max="100" value={mc} onChange={e=>setMc(+e.target.value)} className="w-full accent-[#004030]"/></div>
        <div><label className="text-sm font-bold">{lang==='zh'?'資源相似性 (R/S)':'Resource Similarity (R/S)'}: {rs}%</label>
          <input type="range" min="0" max="100" value={rs} onChange={e=>setRs(+e.target.value)} className="w-full accent-[#004030]"/></div>
      </div>
      <div className="mt-4 grid grid-cols-3 gap-2 text-center">
        {[{label:lang==='zh'?'覺察':'Awareness',val:awareness},{label:lang==='zh'?'動機':'Motivation',val:motivation},{label:lang==='zh'?'競爭強度':'Rivalry',val:rivalry}].map((d,i)=>(
          <div key={i} className="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg">
            <div className="text-2xl font-bold text-[#004030] dark:text-[#D8C3A5]">{d.val}%</div>
            <div className="text-xs text-slate-500 mt-1">{d.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

function App() {
  const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(false);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const menuRef = useRef(null);
  useEffect(() => { if (!menuOpen) return; const h = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); }; document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h); }, [menuOpen]);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  const [analytics, setAnalytics] = useState({ time: Array(N).fill(0), clicks: Array(N).fill(0), quizCorrect: Array(N).fill(0), quizTotal: Array(N).fill(0) });
  const contentRef = useRef(null);
  const timerRef = useRef(null);
  const t = dict[lang];

  useEffect(() => { isDark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark'); }, [isDark]);
  useEffect(() => {
    window.speechSynthesis && window.speechSynthesis.cancel(); setTtsState('idle');
    window.scrollTo({top:0,behavior:'smooth'});
    if (timerRef.current) clearInterval(timerRef.current);
    const mi = module - 1;
    if (mi >= 0 && mi < N) { timerRef.current = setInterval(() => { setAnalytics(a => { const t2 = [...a.time]; t2[mi]++; return {...a, time: t2}; }); }, 1000); }
    return () => clearInterval(timerRef.current);
  }, [module]);

  const handleClick = () => { const mi = module - 1; if (mi >= 0 && mi < N) setAnalytics(a => { const c = [...a.clicks]; c[mi]++; return {...a, clicks: c}; }); };
  const handleQuizSubmit = (modId, correct, total) => { const mi = modId - 1; if (mi >= 0 && mi < N) setAnalytics(a => { const qc=[...a.quizCorrect]; const qt=[...a.quizTotal]; qc[mi]=correct; qt[mi]=total; return {...a, quizCorrect:qc, quizTotal:qt}; }); };

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { window.speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { window.speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { window.speechSynthesis.resume(); setTtsState('playing'); return; }
      window.speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) { texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc].filter(Boolean); }
      else if (module >= 1 && module <= N) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`],t[`${mk}_p1`],t[`${mk}_p2`],t[`${mk}_p3`],...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`),...(t[`${mk}_terms`]||[]).flatMap(term=>[term.front,term.back]),t[`${mk}_case_title`],t[`${mk}_case`],t[`${mk}_case_lesson`]].filter(Boolean);
      } else if (module === N+1) { texts = [t.m6_title, t.m6_desc]; }
      else if (module === N+2) { texts = [t.mlab_title, t.mlab_desc]; }
      else { texts = [t.analytics_title, t.analytics_desc]; }
      const text = texts.filter(Boolean).join(sep);
      const utterance = new SpeechSynthesisUtterance(text); utterance.rate = 0.95;
      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh') { const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh')); if(v)utterance.voice=v; utterance.lang='zh-TW'; }
      else { const v = voices.find(v=>v.lang==='en-GB'&&v.name.includes('Daniel'))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en')); if(v)utterance.voice=v; utterance.lang='en-GB'; }
      utterance.onend = () => setTtsState('idle'); utterance.onerror = () => setTtsState('idle');
      window.speechSynthesis.speak(utterance); setTtsState('playing');
    }
  };

  const handleExportCSV = () => {
    const BOM = '\uFEFF';
    const mNavKeys = ['m1_nav','m2_nav','m3_nav','m4_nav','m5_nav'];
    const rows = [[t.analytics_group,t.analytics_dept,t.analytics_id,t.analytics_name],[studentInfo.group,studentInfo.dept,studentInfo.id,studentInfo.name],[],[t.analytics_module,t.analytics_time,t.analytics_clicks,t.analytics_acc,t.analytics_correct_ans_total],
      ...Array.from({length:N},(_,i)=>{const acc=analytics.quizTotal[i]>0?Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%':t.analytics_no_data;const ans=analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]}/${analytics.quizTotal[i]}/8`:t.analytics_no_data;return[t[mNavKeys[i]],analytics.time[i]+t.analytics_sec,analytics.clicks[i]+t.analytics_times,acc,ans];})];

      <FiveForcesPlusLab lang={lang}/>
      <div className="grid md:grid-cols-2 gap-6">
        <PrisonersDilemmaLab lang={lang}/>
        <AMCLab lang={lang}/>
      </div>
      <LifecycleLab lang={lang}/>
      {renderNavBottom()}
    </div>
  );

  const renderContent = () => {
    // M0
    if (module === 0) return (
      <div className={`space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 ${fade}`}>
        <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white">
          <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
          <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
          <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm">
          <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
          <p className="text-base">{t.m0_why_desc}</p>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">{t.m0_stats.map((s,i)=>(
          <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
            <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
          </div>
        ))}</div>
        <div>
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
          <div className="space-y-3">{t.m0_modules.map((m,i)=>(
            <button key={i} onClick={()=>setModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all text-left group">
              <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
              <div className="flex-1"><div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div><div className="text-sm text-slate-500">{m.desc}</div></div>
              <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0"/>
            </button>
          ))}</div>
        </div>
        <div className="flex justify-end">
          <button onClick={()=>setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] rounded-lg shadow-md">{t.m0_start}</button>
        </div>
      </div>
    );
    // M1-M5
    if (module >= 1 && module <= N) return renderModule(module);
    // M6 Resources
    if (module === N+1) return renderResources();
    // M7 Lab
    if (module === N+2) return renderLab();
    // M8 Analytics
    if (module === N+3) {
      const totalTime = analytics.time.reduce((a,b)=>a+b,0);
      const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
      const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
      const totalAnswered = analytics.quizTotal.reduce((a,b)=>a+b,0);
      const overallAcc = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100)+'%' : t.analytics_no_data;
      const canExport = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.name;
      const mNavKeys = ['m1_nav','m2_nav','m3_nav','m4_nav','m5_nav'];
      return (
        <div className={base}>
          <H2>{t.analytics_title}</H2>
          <p className="text-slate-500 dark:text-slate-400">{t.analytics_desc}</p>
          <div className="grid grid-cols-3 gap-4">{[{label:t.analytics_total_time,val:totalTime+t.analytics_sec},{label:t.analytics_total_clicks,val:totalClicks+t.analytics_times},{label:t.analytics_overall_acc,val:overallAcc}].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center shadow-sm">
              <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
              <p className="text-xs text-slate-500 mt-1">{s.label}</p>
            </div>
          ))}</div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
            <table className="w-full text-sm"><thead><tr className="bg-[#004030] text-[#D8C3A5]">
              <th className="text-left p-3">{t.analytics_module}</th><th className="text-center p-3">{t.analytics_time}</th><th className="text-center p-3">{t.analytics_clicks}</th><th className="text-center p-3">{t.analytics_acc}</th><th className="text-center p-3 hidden md:table-cell">{t.analytics_correct_ans_total}</th>
            </tr></thead><tbody>{Array.from({length:N},(_,i)=>{
              const acc=analytics.quizTotal[i]>0?Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%':t.analytics_no_data;
              const ans=analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]}/${analytics.quizTotal[i]}/8`:t.analytics_no_data;
              return <tr key={i} className="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50"><td className="p-3 font-medium text-[#004030] dark:text-[#D8C3A5]">{t[mNavKeys[i]]}</td><td className="p-3 text-center">{analytics.time[i]}{t.analytics_sec}</td><td className="p-3 text-center">{analytics.clicks[i]}{t.analytics_times}</td><td className="p-3 text-center">{acc}</td><td className="p-3 text-center hidden md:table-cell">{ans}</td></tr>;
            })}</tbody></table>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_group}</label>
                <select value={studentInfo.group} onChange={e=>setStudentInfo({...studentInfo,group:e.target.value})} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"><option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_dept}</label>
                <input value={studentInfo.dept} onChange={e=>setStudentInfo({...studentInfo,dept:e.target.value})} placeholder={t.analytics_dept_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_id}</label>
                <input value={studentInfo.id} onChange={e=>setStudentInfo({...studentInfo,id:e.target.value})} placeholder={t.analytics_id_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_name}</label>
                <input value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo,name:e.target.value})} placeholder={t.analytics_name_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
            </div>
            <button onClick={handleExportCSV} disabled={!canExport} className="mt-4 px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors text-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
          </div>
          {renderNavBottom()}
        </div>
      );
    }
  };

  return (
    <div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030] flex flex-col overflow-x-hidden pt-16">
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 lg:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <div className="relative" ref={menuRef}>
              <button className="p-2 hover:bg-white/10 rounded-lg" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span><span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="font-serif font-black text-lg tracking-widest text-[#D8C3A5]">ICA</div>
              <div className="hidden sm:block text-left"><h1 className="font-serif font-bold text-sm md:text-base leading-tight">{t.title}</h1><p className="text-[10px] text-[#D8C3A5]/70">{t.subtitle}</p></div>
            </button>
          </div>
          <div className="flex items-center space-x-1">
            <div className="flex items-center space-x-1 mr-2">
              {ttsState!=='playing'?(<button onClick={()=>handleTTS('play')} title={t.audio_read} className="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center space-x-1 text-xs"><IconPlay size={14}/><span className="hidden md:inline">{t.audio_read}</span></button>):(<button onClick={()=>handleTTS('pause')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconPause size={14}/></button>)}
              {ttsState!=='idle'&&<button onClick={()=>handleTTS('stop')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconSquare size={14}/></button>}
            </div>
            <button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-sm font-bold transition-colors">{lang==='zh'?'EN':'中文'}</button>
            <button onClick={()=>setIsDark(!isDark)} className="p-2 rounded-full hover:bg-white/10 transition-colors">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>
      <div className="max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 flex-1 flex flex-col md:flex-row gap-0 py-6">
        <aside className="hidden md:block w-64 shrink-0 mr-6">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden sticky top-24">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
            <nav className="space-y-0.5 p-2">{modulesList.map(m=>(
              <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5] border border-[#D8C3A5]/30':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                <span className={`mr-2.5 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.icon}</span><span className="truncate">{m.title}</span>
                {module===m.id&&<IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
              </button>
            ))}</nav>
          </div>
        </aside>
        <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">{renderContent()}</div>
        </main>
      </div>
      <footer className="bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5]">
        <div className="max-w-7xl mx-auto px-4 h-8 flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4">
            <div className="font-serif font-black text-[#D8C3A5] hidden sm:block tracking-widest text-sm">ICA</div>
            <span className="truncate">{t.copyright} · {t.date}</span>
          </div>
          <div className="flex items-center space-x-3 md:space-x-4">
            <span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-600 pl-3"><IconChevronUp size={12} className="md:mr-1"/><span className="hidden sm:inline">TOP</span></button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
