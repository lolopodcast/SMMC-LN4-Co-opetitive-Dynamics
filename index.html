    m3_cards: [
      { title: "囚犯困境與合作均衡", desc: "兩家企業各自追求最大利益時往往陷入雙輸局面。將一次性賽局轉為重複賽局，或透過嚇阻建立報復機制，可將均衡推向合作。" },
      { title: "硬承諾 vs. 軟承諾", desc: "硬承諾（建新廠）信號激進意圖，在產量競爭中有利；軟承諾（設定利潤目標）信號溫和意圖，在價格競爭中有利。" }
    ],
    m3_case_title: "微個案：台灣航空業華航與長榮的競合賽局",
    m3_case: "華航與長榮自 1991 年便展開雙雄爭霸。這場賽局展現了競合雙重性。競爭面：在黃金航線、票價、里程計畫全面較勁。合作面：雙方共同面對外部威脅時展現默契，如面對廉航進攻，雙方各自以子公司或關聯企業回應；疫情期間協同調整航班共享貨運能量；加入不同的全球航空聯盟，既是差異化也是隱性的市場分工。",
    m3_case_lesson: "啟示：在直接航線上激烈競爭，卻在產業政策、外部威脅與聯盟策略上形成互補與合作。雙方的存在共同提升了台灣航空樞紐的總體價值。",
    m3_terms: [
      { front: "競合 (Co-opetition)", back: "Brandenburger & Nalebuff 提出：商業關係同時包含競爭與合作。應識別何時合作創造價值（把餅做大），何時競爭攫取價值（分餅）。" },
      { front: "囚犯困境 (Prisoners' Dilemma)", back: "經典模型：理性參與者追求個人最優時陷入集體次優結果。在商業中表現為價格戰等雙輸局面。" },
      { front: "承諾 (Commitment)", back: "策略性地限制自身未來選項以增強可信度。關鍵在於使承諾「不可逆轉」，消除退路讓對手相信你會貫徹到底。" },
      { front: "PARTS 架構", back: "賽局分析框架：Players(參與者)、Added Values(附加價值)、Rules(規則)、Tactics(戰術)、Scope(範圍)。" }
    ],
    m3_q: [
      { q: "競合策略的核心理念是什麼？", opts: ["商業即戰爭，只有競爭","商業關係同時包含競爭與合作","只需合作，避免競爭","競爭與合作互斥"], ans: 1, exp: "Brandenburger & Nalebuff 指出合作創造價值，競爭分配價值。" },
      { q: "囚犯困境中，如何將均衡推向「雙方合作」？", opts: ["增加參與者數量","將一次性賽局轉為重複賽局，或建立嚇阻機制","降低報酬","改變參與者身份"], ans: 1, exp: "重複賽局讓參與者認識到背叛的長期代價，嚇阻則改變短期報酬。" },
      { q: "PARTS 架構中的 A 代表什麼？", opts: ["行動 (Action)","附加價值 (Added Values)","聯盟 (Alliance)","分析 (Analysis)"], ans: 1, exp: "PARTS = Players, Added Values, Rules, Tactics, Scope." },
      { q: "承諾 (Commitment) 策略的關鍵要素是什麼？", opts: ["靈活性","不可逆轉性","秘密性","漸進性"], ans: 1, exp: "承諾之所以有效在於它是不可逆轉的，消除退路才能讓對手相信。" }
    ],
    m3_wrap: "賽局理論教導我們，競爭不必然是零和遊戲。透過 PARTS 架構分析互動關係，企業可以藉由承諾、嚇阻與改變賽局規則，主動塑造更有利的競合環境。",

    m4_nav: "4. 競爭者分析與競爭動態", m4_title: "競爭者分析與競爭動態",
    m4_p1: "在高度集中的產業中，企業的競爭環境主要由最近對手的行為所塑造。Porter 提出四構面競爭者分析框架：分析對手的現行策略、目標、產業假設、以及資源與能力，藉以預測其未來行為與對我方行動的反應。",
    m4_p2: "「偉大的將領——從漢尼拔到巴頓——的共同特質是能直接『進入對手指揮官的腦中思考』。」——Grant",
    m4_p3: "競爭動態的 AMC 模型從認知層面出發：競爭行為取決於覺察（Awareness）、動機（Motivation）、能力（Capability）。市場共通性（M/C）越高，多點接觸帶來的相互克制效應越強——發動攻擊的機率降低，但一旦被攻擊則回應機率上升。資源相似性（R/S）越高，越可能採取相似的策略模式。",
    m4_cards: [
      { title: "Porter 四構面分析框架", desc: "（1）策略：對手如何競爭？（2）目標：追求市占或獲利？（3）假設：對產業的盲點？（4）資源與能力：強弱項？結合以預測對手行動。" },
      { title: "AMC 競爭動態模型", desc: "行動分為策略性（高承諾、難逆轉，如建新廠）與戰術性（如價格調整），兩者引發的回應程度不同。受市場共通性與資源相似性深刻影響。" }
    ],
    m4_case_title: "微個案：台灣便利商店雙雄的競爭動態",
    m4_case: "台灣便利商店密度極高，7-ELEVEN 與全家的競爭堪稱 AMC 活教材。市場共通性（M/C）：兩者在都會區幾乎完全重疊。資源相似性（R/S）：都背靠大型集團，擁有相似物流、鮮食廠、會員系統。競爭動態展現快速的行動—回應循環：全家推咖啡寄杯，7-11 隨即跟進；7-11 建構點數生態圈，全家以 App 媒體反攻。這種高 M/C 與高 R/S 的「軍備競賽」共同將超商轉型為「生活服務平台」，擴大了產業價值。",
    m4_case_lesson: "啟示：極高的覺察（密切監控）、強烈的動機（寸土必爭）、對等的能力（資源相當），形成快速的行動與回應循環，推動整個產業升級。",
    m4_terms: [
      { front: "AMC 模型", back: "競爭動態核心框架：Awareness(覺察) × Motivation(動機) × Capability(能力)。決定企業是否發動競爭行動及如何回應。" },
      { front: "市場共通性 (Market Commonality)", back: "兩家企業在市場上的重疊程度。共通性越高，多點接觸帶來的相互克制效應越強，但被攻擊時回應越激烈。" },
      { front: "資源相似性 (Resource Similarity)", back: "資源與能力的相似程度。相似性越高，越可能採取類似策略，回應能力也越強。" },
      { front: "相互克制 (Mutual Forbearance)", back: "當企業在多個市場遭遇時，會傾向避免全面價格戰，因擔心對方在其他核心市場報復。" }
    ],
    m4_q: [
      { q: "AMC 模型中，M 代表什麼？", opts: ["市場 (Market)","動機 (Motivation)","管理 (Management)","製造 (Manufacturing)"], ans: 1, exp: "AMC = 覺察、動機、能力。動機決定企業是否有足夠理由回應。" },
      { q: "多點接觸會帶來什麼效應？", opts: ["增加攻擊頻率","相互克制 (Mutual Forbearance)","降低競爭意識","消除競爭"], ans: 1, exp: "在多個市場相遇時雙方傾向克制，避免報復。" },
      { q: "7-ELEVEN 與全家的競爭動態屬於哪種組合？", opts: ["高 M/C × 低 R/S","低 M/C × 高 R/S","高 M/C × 高 R/S","低 M/C × 低 R/S"], ans: 2, exp: "市場高度重疊且資源組成極為相似，形成最激烈的競爭動態。" },
      { q: "策略性行動與戰術性行動的主要差異是什麼？", opts: ["規模大小","承諾程度與可逆轉性","速度快慢","花費金額"], ans: 1, exp: "策略性行動（如建廠）高度承諾且難逆轉；戰術性行動（如調價）較靈活可逆。" }
    ],
    m4_wrap: "競爭不是單向的攻擊，而是互動的對弈。透過 Porter 四構面與 AMC 模型，我們能夠洞察對手的決策邏輯，並預測他們對市場變化的反應速度與強度。",

    m5_nav: "5. 市場區隔與策略群組", m5_title: "市場區隔與策略群組",
    m5_p1: "要進行更精細的產業分析，必須將廣泛的產業拆解為更細緻的市場——這就是區隔分析。區隔的依據是客戶特性（人口統計、購買行為）與產品特性（價格、功能），目的是找出替代性限制最大的市場界線。",
    m5_p2: "「選擇服務哪些客戶、提供什麼產品——這就是區隔決策的本質，也是策略定位的起點。」——Grant",
    m5_p3: "策略群組分析則從企業策略面切入：在同一產業中，採取類似策略（如產品範圍、品質定位）的企業構成一個策略群組。群組之間的利潤差異受「移動障礙」（Mobility Barriers）保護。利潤池（Profit Pool）分析則提供垂直區隔視角，識別價值鏈中哪些環節最具獲利潛力。",
    m5_cards: [
      { title: "區隔分析五步驟", desc: "（1）辨識關鍵變數 →（2）建構矩陣 →（3）分析區隔吸引力 →（4）辨識關鍵成功因素 →（5）選擇範圍（廣泛或聚焦）。" },
      { title: "藍海策略的定位意涵", desc: "藍海策略本質上是區隔分析的延伸——找到未被服務（或服務不足）的市場區隔，如 Nintendo Wii 瞄準休閒玩家。" }
    ],
    m5_case_title: "微個案：台灣電動機車——Gogoro vs. 光陽的策略群組",
    m5_case: "Gogoro 以「科技公司」自居，核心策略是建立換電網路平台生態系，並以 PBGN 開放聯盟吸引車廠加入，目標成為「電動機車界 Android」。光陽（KYMCO）則走「傳統車廠轉型」路線，強調充換電並行的彈性、更親民的定價與全球經銷網路。兩者的策略差異形成明確的移動障礙：Gogoro 的壁壘在換電基礎設施與生態系鎖定效應；光陽的壁壘在品牌通路與 30 年製造經驗。",
    m5_case_lesson: "啟示：Gogoro 與光陽代表兩個截然不同的策略群組，各自的移動障礙保護了彼此的利基，也共同推動了台灣電動機車供應鏈的成熟。",
    m5_terms: [
      { front: "策略群組 (Strategic Group)", back: "產業中採取相同或相似策略的企業群體。群組間受移動障礙保護，可能有不同的獲利水平。" },
      { front: "移動障礙 (Mobility Barriers)", back: "阻止企業從一個策略群組移動到另一個群組的因素。是「進入障礙」在群組層級的對應概念。" },
      { front: "利潤池 (Profit Pool)", back: "將產業價值鏈各環節按照營收占比與利潤率繪製，識別最具獲利潛力的環節的垂直區隔分析工具。" },
      { front: "區隔變數 (Segmentation Variables)", back: "用以劃分市場的基準，常見如客戶特性(地理/人口)與產品特性(價格/功能)。" }
    ],
    m5_q: [
      { q: "策略群組之間的利潤差異受什麼保護？", opts: ["政府法規","移動障礙","品牌忠誠","技術專利"], ans: 1, exp: "移動障礙是群組間的「進入障礙」，使特定群組維持獲利水平。" },
      { q: "Gogoro 的核心策略定位最接近哪種角色？", opts: ["傳統車廠","換電平台生態系營運商","零件供應商","共享經濟公司"], ans: 1, exp: "Gogoro 核心價值在於換電平台與 PBGN 開放聯盟生態系。" },
      { q: "利潤池分析的主要用途是什麼？", opts: ["評估員工績效","識別價值鏈中最具獲利潛力的環節","計算市場佔有率","預測股價走勢"], ans: 1, exp: "利潤池分析將各環節營收與利潤率可視化，幫助識別高獲利環節。" },
      { q: "光陽在電動機車市場的主要移動障礙是什麼？", opts: ["換電網絡規模","品牌通路、全球經銷網與製造經驗","政府補貼","App 會員數"], ans: 1, exp: "光陽的壁壘在於 30 年積累的通路與製造經驗，新進者難以快速複製。" }
    ],
    m5_wrap: "市場並非鐵板一塊。透過市場區隔與策略群組分析，企業能精準定位自身的戰場，構建防禦性的「移動障礙」，並在價值鏈的利潤池中找到最佳的獲利據點。",

    m6_nav: "6. 外部資源", m6_title: "延伸閱讀與外部資源", m6_desc: "精選與本單元主題相關的學術論文、影片、產業分析報告與新聞連結。",
    mlab_nav: "7. 互動實驗室", mlab_title: "互動實驗室", mlab_desc: "透過互動式圖表與模型，動態探索產業分析的核心概念。"
  },

    m1_nav: "1. Five Forces & Complements", m1_title: "Extending Five Forces & Complements",
    m1_p1: "While Porter's Five Forces is widely used, it faces criticisms: its S-C-P foundation lacks rigor compared to game theory, and industry factors explain less than 20% of inter-firm profitability differences.",
    m1_p2: "\"Complements increase the value of a product: without ink cartridges, my printer is useless. Our competitive analysis must account for them.\" — Grant",
    m1_p3: "Brandenburger and Nalebuff proposed the Value Net framework, adding complementors. In digital markets, complementary relationships create network externalities, leading to winner-takes-all dynamics.",
    m1_cards: [
      { title: "Strategic Logic of Complements", desc: "Pursue monopolization and differentiation in your own product; simultaneously encourage competition and commoditization in complementary products." },
      { title: "Platform Competition & Winner-Takes-All", desc: "In digital markets, users and developers gravitate toward the leading platform (network externalities), creating self-reinforcing cycles." }
    ],
    m1_case_title: "Micro-Case: TSMC OIP Ecosystem — Complement Value Co-Creation",
    m1_case: "TSMC established the Open Innovation Platform (OIP) in 2008, bringing together EDA vendors, IP providers, and cloud partners to form a powerful ecosystem. TSMC opens process parameters to enable deep EDA optimization, helping customers achieve 'first-time-right' tapeouts. This reduces switching incentives to competitors. TSMC becomes the irreplaceable bottleneck by controlling the integration interface.",
    m1_case_lesson: "Insight: TSMC perfectly illustrates complement strategy: build an irreplaceable position in your domain while fostering competition in complement markets.",
    m1_terms: [
      { front: "Complements", back: "Products/services that increase the value of another product. E.g., EDA software for foundry services." },
      { front: "Value Net", back: "Framework by Brandenburger & Nalebuff placing the firm at the center of customers, suppliers, competitors, and complementors." },
      { front: "Network Externality", back: "When a product's value to users increases with the number of other users. Creates positive feedback loops." },
      { front: "S-C-P Paradigm", back: "Structure-Conduct-Performance model, arguing industry structure determines firm behavior and performance." }
    ],
    m1_q: [
      { q: "Industry factors explain approx what % of inter-firm profit variance?", opts: ["Over 50%","About 30-40%","Less than 20%","About 80%"], ans: 2, exp: "Studies show industry factors explain less than 20% of ROA variance." },
      { q: "In complement strategy, how should firms treat complement markets?", opts: ["Monopolize them","Encourage competition and commoditization","Ignore them","Restrict supply"], ans: 1, exp: "Monopolize your product while encouraging complement market competition." },
      { q: "Who proposed the Value Net framework?", opts: ["Michael Porter","Joseph Schumpeter","Brandenburger & Nalebuff","Clay Christensen"], ans: 2, exp: "Adam Brandenburger and Barry Nalebuff proposed the Value Net." },
      { q: "TSMC's OIP ecosystem represents which complement strategy?", opts: ["Closed integration","Open platform fostering complement competition","Price war","Vertical integration"], ans: 1, exp: "TSMC opens process info to promote EDA/IP competition." }
    ],
    m1_wrap: "The traditional five forces framework views industries as static structures but ignores the value co-creation of 'complements'. Through Value Net and platform strategies, firms build massive moats via network externalities, as shown by TSMC's OIP ecosystem.",

    m2_nav: "2. Dynamic Competition", m2_title: "Dynamic Competition & Hypercompetition",
    m2_p1: "Joseph Schumpeter viewed competition as a 'perennial gale of creative destruction': market leaders are constantly challenged. If structural change is rapid, Porter's framework offers no stable analytical basis.",
    m2_p2: "\"Intense and rapid competitive moves, in which competitors must move quickly to build new advantages...\" — Richard D'Aveni",
    m2_p3: "D'Aveni's hypercompetition and McGrath's 'transient advantage' argue competitive advantage is no longer durable—firms must continuously create series of short-term advantages.",
    m2_cards: [
      { title: "Industry Lifecycle & Competitive Evolution", desc: "Embryonic (tech) → Growth (capacity) → Shakeout (consolidation) → Maturity (efficiency) → Decline (price wars). KSFs differ dramatically." },
      { title: "Digital Age Impact on Five Forces", desc: "Internet lowers entry barriers, reduces switching costs, increases substitution, and weakens differentiation—negatively impacting attractiveness." }
    ],
    m2_case_title: "Micro-Case: Taiwan's Display Industry — Creative Destruction",
    m2_case: "Taiwan's display panel industry perfectly exemplifies hypercompetition: rapid tech shifts (LCD to OLED to Mini LED), massive capex creating overcapacity, and cyclical price crashes. Korean firms pivoted to OLED; China's BOE leveraged subsidies for massive LCD capacity. Taiwan's advantages eroded within a decade, forcing a pivot to high-value niches.",
    m2_case_lesson: "Insight: In rapidly iterating tech industries, today's leader may be tomorrow's follower. Continuous innovation and agile pivots are necessities.",
    m2_terms: [
      { front: "Creative Destruction", back: "Schumpeter's concept: competition is an innovation process where market leaders are constantly challenged and displaced." },
      { front: "Hypercompetition", back: "D'Aveni's concept: rapid competitive moves render advantages temporary. Firms must continuously create new ones." },
      { front: "Transient Advantage", back: "McGrath's argument: sustainable advantage is rare. Strategy should focus on creating series of short-term advantages." },
      { front: "Shakeout", back: "Phase following slowing growth where firms unable to achieve scale or differentiation are forced to exit or consolidate." }
    ],
    m2_q: [
      { q: "What is the core claim of hypercompetition?", opts: ["Industry structure is stable","Advantage is durable","Advantage is temporary; firms must create new ones","Only large firms survive"], ans: 2, exp: "D'Aveni argues advantages are fleeting; firms must constantly build new ones." },
      { q: "What is the KSF during industry maturity?", opts: ["Product innovation","Cost efficiency and scale economies","R&D investment","Brand building"], ans: 1, exp: "Markets commoditize and competition focuses on cost efficiency." },
      { q: "Taiwan's display decline best illustrates which concept?", opts: ["Five Forces stability","Creative destruction and hypercompetition","Perfect competition","Resource-based view"], ans: 1, exp: "Rapid tech iteration and overcapacity perfectly illustrate dynamic competition." },
      { q: "How should strategy adapt under McGrath's view?", opts: ["Pursue single durable advantage","Create series of short-term advantages","Avoid competition","Only defend"], ans: 1, exp: "Firms should manage 'advantage portfolios,' continuously launching new cycles." }
    ],
    m2_wrap: "Faced with tech shifts and globalization, static analysis falls short. Understanding creative destruction and agilely creating a portfolio of transient advantages across the industry lifecycle are key to survival.",

    m3_nav: "3. Game Theory & Co-opetition", m3_title: "Game Theory & Co-opetition",
    m3_p1: "Game theory overcomes Five Forces' static defects, modeling competition as interactive decision-making. It helps frame strategic decisions and predicts competitive outcomes.",
    m3_p2: "\"All business relationships combine elements of both competition and cooperation.\" — Brandenburger & Nalebuff",
    m3_p3: "Game theory reveals strategic behaviors: cooperation, deterrence, commitment, changing game structure, and signaling. The PARTS framework systematizes these: Players, Added Values, Rules, Tactics, Scope.",
    m3_cards: [
      { title: "Prisoners' Dilemma & Cooperative Equilibria", desc: "Converting one-shot to repeated games, or establishing deterrence via retaliation mechanisms, can shift equilibrium from defection to cooperation." },
      { title: "Hard vs. Soft Commitments", desc: "Hard commitments (building plants) signal aggressive intent (good for quantity competition). Soft commitments signal moderation (good for price competition)." }
    ],
    m3_case_title: "Micro-Case: Taiwan Airlines Co-opetitive Game",
    m3_case: "China Airlines and EVA Air demonstrate co-opetition. Competitively: clashing on premium routes and pricing. Cooperatively: aligning against external threats (LCCs) and sharing cargo capacity during the pandemic. Joining different global alliances represents both differentiation and implicit market division.",
    m3_case_lesson: "Insight: Fierce competition on direct routes, yet cooperation on industry policy and external threats. Both enhance Taiwan's aviation hub value.",
    m3_terms: [
      { front: "Co-opetition", back: "Concept that business relationships combine competition and cooperation. Cooperate to grow the pie, compete to divide it." },
      { front: "Prisoners' Dilemma", back: "Model where rational players reach collectively suboptimal outcomes (e.g., price wars)." },
      { front: "Commitment", back: "Strategically eliminating future options to enhance credibility. Making it 'irreversible'." },
      { front: "PARTS Framework", back: "Game elements: Players, Added Values, Rules, Tactics, Scope." }
    ],
    m3_q: [
      { q: "What is the core idea of co-opetition?", opts: ["Business is war","Relationships combine competition and cooperation","Only cooperate","They are mutually exclusive"], ans: 1, exp: "Cooperate to create value, compete to capture it." },
      { q: "How can the prisoners' dilemma shift to cooperation?", opts: ["Add players","Convert to repeated game or establish deterrence","Reduce payoffs","Change identities"], ans: 1, exp: "Repeated games reveal long-term costs; deterrence changes short-term payoffs." },
      { q: "What does the 'A' in PARTS represent?", opts: ["Action","Added Values","Alliance","Analysis"], ans: 1, exp: "PARTS = Players, Added Values, Rules, Tactics, Scope." },
      { q: "What is the key element of commitment strategy?", opts: ["Flexibility","Irreversibility","Secrecy","Gradualism"], ans: 1, exp: "Commitment works because it's irreversible—eliminating retreat options." }
    ],
    m3_wrap: "Game theory teaches that competition isn't always zero-sum. By analyzing interactions via the PARTS framework, firms can proactively shape favorable co-opetitive environments through commitments and deterrence.",

    m4_nav: "4. Competitor Analysis", m4_title: "Competitor Analysis & Competitive Dynamics",
    m4_p1: "Porter proposes a four-component competitor analysis framework: current strategy, objectives, industry assumptions, and resources & capabilities.",
    m4_p2: "\"Great generals shared the ability to 'get inside the heads' of opposing commanders.\" — Grant",
    m4_p3: "The AMC model approaches from cognition: behavior depends on Awareness, Motivation, and Capability. Higher Market Commonality creates mutual forbearance. Higher Resource Similarity means similar strategies and capabilities.",
    m4_cards: [
      { title: "Porter's 4-Component Framework", desc: "Strategy, Objectives, Assumptions, Resources & Capabilities. Combined, these predict rival actions and reactions." },
      { title: "AMC Competitive Dynamics Model", desc: "Awareness × Motivation × Capability. Actions are strategic (hard-to-reverse) or tactical (price adjustments)." }
    ],
    m4_case_title: "Micro-Case: Taiwan CVS Duopoly Dynamics",
    m4_case: "7-ELEVEN and FamilyMart provide a living AMC textbook. High Market Commonality (urban overlap) and High Resource Similarity (backed by major groups, similar logistics). This creates rapid action-response cycles: FamilyMart pioneers coffee pre-ordering, 7-11 follows. Their 'arms race' transforms CVS into 'life service platforms'.",
    m4_case_lesson: "Insight: High M/C and High R/S create rapid action-response cycles that continuously upgrade the entire industry.",
    m4_terms: [
      { front: "AMC Model", back: "Core framework: Awareness × Motivation × Capability. Determines competitive actions and responses." },
      { front: "Market Commonality", back: "Degree of market overlap. High commonality creates mutual forbearance but fierce responses when attacked." },
      { front: "Resource Similarity", back: "Degree of similarity in resources. Leads to similar strategies and strong response capability." },
      { front: "Mutual Forbearance", back: "Firms meeting in multiple markets tend to restrain aggressive pricing to avoid cross-market retaliation." }
    ],
    m4_q: [
      { q: "What does M stand for in the AMC model?", opts: ["Market","Motivation","Management","Manufacturing"], ans: 1, exp: "AMC = Awareness, Motivation, Capability." },
      { q: "What effect does multi-market contact create?", opts: ["Increased attack frequency","Mutual forbearance","Reduced awareness","Competition elimination"], ans: 1, exp: "Firms tend toward restraint to avoid retaliation across markets." },
      { q: "7-ELEVEN vs. FamilyMart represents which combination?", opts: ["High M/C × Low R/S","Low M/C × High R/S","High M/C × High R/S","Low M/C × Low R/S"], ans: 2, exp: "Heavy market overlap (high M/C) with very similar resources (high R/S)." },
      { q: "What distinguishes strategic from tactical actions?", opts: ["Size difference","Commitment level and reversibility","Speed difference","Cost amount"], ans: 1, exp: "Strategic actions involve high commitment and irreversibility; tactical actions are flexible." }
    ],
    m4_wrap: "Competition is an interactive game. Through Porter's four components and the AMC model, we can deduce rivals' decision logic and anticipate the speed and intensity of their responses.",

    m5_nav: "5. Segmentation & Strategic Groups", m5_title: "Segmentation & Strategic Groups",
    m5_p1: "Segmentation disaggregates broad industries into specific markets based on customer and product characteristics to find market boundaries.",
    m5_p2: "\"Choosing which customers to serve and what to offer them—this is the essence of segmentation decisions.\" — Grant",
    m5_p3: "Strategic group analysis segments from the strategy side. Profitability differences are protected by mobility barriers. Profit pool analysis provides vertical segmentation.",
    m5_cards: [
      { title: "5-Step Segmentation Analysis", desc: "Identify variables → Construct matrix → Analyze attractiveness → Identify KSFs → Select scope." },
      { title: "Blue Ocean Strategy Implication", desc: "Blue Ocean is essentially extended segmentation—finding unserved or underserved segments." }
    ],
    m5_case_title: "Micro-Case: Taiwan Electric Scooters Strategic Groups",
    m5_case: "Gogoro positions as a 'tech company' building a battery-swap platform ecosystem. KYMCO takes a 'traditional OEM transformation' route with charge-swap flexibility and global reach. Their differing strategies create mobility barriers protecting their respective niches.",
    m5_case_lesson: "Insight: Gogoro and KYMCO represent distinct strategic groups with mobility barriers protecting each niche, collectively maturing Taiwan's EV scooter supply chain.",
    m5_terms: [
      { front: "Strategic Group", back: "Firms following similar strategies. Protected by mobility barriers." },
      { front: "Mobility Barriers", back: "Factors preventing movement between strategic groups. Group-level entry barriers." },
      { front: "Profit Pool", back: "Vertical segmentation mapping revenue and profit margins across value chain activities." },
      { front: "Segmentation Variables", back: "Bases for dividing markets, e.g., demographics, geography, price, features." }
    ],
    m5_q: [
      { q: "What protects profitability differences between strategic groups?", opts: ["Government regulations","Mobility barriers","Brand loyalty","Tech patents"], ans: 1, exp: "Mobility barriers are group-level 'entry barriers'." },
      { q: "Gogoro's core strategic positioning is closest to:", opts: ["Traditional OEM","Battery-swap platform ecosystem operator","Parts supplier","Sharing economy company"], ans: 1, exp: "Gogoro positions as an energy management tech company focusing on its swap ecosystem." },
      { q: "What is the main use of profit pool analysis?", opts: ["Evaluate employees","Identify most profitable value chain activities","Calculate market share","Predict stock prices"], ans: 1, exp: "Maps margins across value chain to identify high-profit segments." },
      { q: "What is KYMCO's main mobility barrier?", opts: ["Swap network scale","Brand channels, global dealer network & manufacturing","Government subsidies","App members"], ans: 1, exp: "KYMCO's barriers are 30 years of manufacturing, brand channels, and global networks." }
    ],
    m5_wrap: "Markets are not monoliths. Segmentation and strategic group analysis allow firms to precisely pinpoint their battlegrounds, establish defensive 'mobility barriers', and capture high margins in the profit pool.",

    m6_nav: "6. External Resources", m6_title: "Extended Reading & External Resources", m6_desc: "Curated academic papers, videos, industry reports, and news links related to this module's topics.",
    mlab_nav: "7. Interactive Lab", mlab_title: "Interactive Lab", mlab_desc: "Explore core industry analysis concepts through interactive charts and models."
  }
};

// Components
const CardDeck = ({ cards, t, onCardRead }) => {
  const [page, setPage] = useState(0);
  const [flippedState, setFlippedState] = useState(new Set()); // Tracks current front/back facing
  const [readCards, setReadCards] = useState(new Set()); // Tracks unique cards viewed
  const itemsPerPage = 2; // Strict Rule: show 2 per page
  const totalPages = Math.ceil(cards.length / itemsPerPage);
  const visibleCards = cards.slice(page * itemsPerPage, (page + 1) * itemsPerPage);

  const handleFlip = (globalIdx) => {
    // Flip Toggle Logic (Allows flipping back to front)
    const newFlipped = new Set(flippedState);
    if (newFlipped.has(globalIdx)) newFlipped.delete(globalIdx);
    else newFlipped.add(globalIdx);
    setFlippedState(newFlipped);

    // Track Read Logic (Only adds, never deletes, for analytics)
    const newRead = new Set(readCards);
    if (!newRead.has(globalIdx)) {
      newRead.add(globalIdx);
      setReadCards(newRead);
      onCardRead(newRead.size, cards.length);
    }
  };

  const handleNext = () => {
    setFlippedState(new Set()); // Reset to front on page change
    if (page + 1 >= totalPages) setPage(0);
    else setPage(page + 1);
  };

  const handleRetry = () => {
    setFlippedState(new Set()); // Reset all faces
    setPage(0);
  };

  return (
    <div className="space-y-4">
      <div className="flex justify-between items-center mb-2">
        <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 select-none">{t.key_terms}</h3>
        <span className="text-xs text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded select-none shadow-sm border border-slate-200 dark:border-slate-700">
          Read: {readCards.size} / {cards.length}
        </span>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {visibleCards.map((c, i) => {
          const gIdx = page * itemsPerPage + i;
          const isFlipped = flippedState.has(gIdx);
          return (
            <div key={gIdx} className="perspective cursor-pointer h-40" onClick={() => handleFlip(gIdx)}>
              <div className={`transform-style-3d relative w-full h-full ${isFlipped ? 'rotate-y-180' : ''}`}>
                <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm hover:border-bcgGold transition-colors select-none">
                  <p className="font-serif font-bold text-center text-bcgGreen dark:text-bcgGold text-sm">{c.front}</p>
                  <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
                </div>
                <div className="backface-hidden rotate-y-180 absolute inset-0 bg-bcgGreen dark:bg-slate-700 rounded-xl p-5 flex items-center justify-center overflow-y-auto shadow-md">
                  <p className="text-sm text-center text-bcgGold dark:text-slate-200 leading-relaxed select-none">{c.back}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex justify-end gap-3 mt-4 select-none">
        <button onClick={handleRetry} className="px-4 py-2 text-xs font-bold border border-bcgGreen dark:border-bcgGold text-bcgGreen dark:text-bcgGold rounded-lg hover:bg-bcgGreen/10 transition-colors">{t.retry}</button>
        <button onClick={handleNext} className="px-4 py-2 text-xs font-bold bg-bcgGreen dark:bg-bcgGold text-white dark:text-bcgGreen rounded-lg hover:bg-[#002b20] transition-colors shadow-sm">{t.next} ({page+1}/{totalPages})</button>
      </div>
    </div>
  );
};

const QuizDeck = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [page, setPage] = useState(0);
  const [selected, setSelected] = useState({});
  const itemsPerPage = 2; // Strict Rule: show 2 per page
  const totalPages = Math.ceil(questions.length / itemsPerPage);
  const qIndices = [...Array(questions.length).keys()].slice(page*itemsPerPage, (page+1)*itemsPerPage);

  const handleSelect = (globalIdx, optIdx) => {
    const newSel = {...selected, [globalIdx]: optIdx};
    setSelected(newSel);
    // Update analytics dynamically
    const answeredCount = Object.keys(newSel).length;
    let correctCount = 0;
    Object.keys(newSel).forEach(k => { if(newSel[k] === questions[k].ans) correctCount++; });
    onQuizSubmit(moduleId, correctCount, answeredCount);
  };

  const handleNext = () => {
    if (page + 1 >= totalPages) setPage(0);
    else setPage(page + 1);
  };

  return (
    <div className="mt-10 bg-white dark:bg-slate-900 rounded-xl p-5 sm:p-6 border border-slate-200 dark:border-slate-700 shadow-sm relative">
      <div className="absolute -top-3 left-6 bg-bcgGold text-bcgGreen text-xs font-black px-3 py-1 rounded uppercase tracking-widest select-none shadow-sm flex items-center gap-2"><IconBookOpen size={14}/> {t.quiz_title}</div>
      <div className="space-y-8 mt-4">
        {qIndices.map((qIdx, i) => {
          const q = questions[qIdx];
          const ansSelected = selected[qIdx] !== undefined;
          const isCorrect = selected[qIdx] === q.ans;
          return (
            <div key={qIdx} className="space-y-3">
              <p className="font-bold text-slate-800 dark:text-slate-200 text-sm select-none">Q{qIdx+1}. {q.q}</p>
              <div className="space-y-2 select-none">{q.opts.map((opt, oi) => {
                let cls = "w-full text-left px-4 py-2.5 rounded-lg border text-sm transition-colors ";
                if (!ansSelected) cls += "border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300";
                else if (oi === q.ans) cls += "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-bold shadow-sm";
                else if (selected[qIdx] === oi) cls += "border-red-400 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400";
                else cls += "border-slate-200 dark:border-slate-600 opacity-50 text-slate-500";
                return <button key={oi} disabled={ansSelected} onClick={() => handleSelect(qIdx, oi)} className={cls}>{opt}</button>;
              })}</div>
              {ansSelected && (
                <div className={`p-3 rounded-lg text-xs mt-2 border ${isCorrect?'bg-green-50 border-green-200 dark:bg-green-900/20 dark:border-green-800/50 text-green-800 dark:text-green-300':'bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800/50 text-red-800 dark:text-red-300'}`}>
                  <span className="font-bold mr-2 text-[13px]">{isCorrect ? t.praise_msg[qIdx%3] : t.encourage_msg[qIdx%3]}</span>
                  <span className="opacity-90">{t.explanation}：{q.exp}</span>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="flex justify-between items-center mt-6 border-t border-slate-100 dark:border-slate-800 pt-4 select-none">
        <span className="text-xs text-slate-500">Page {page+1} of {totalPages}</span>
        <div className="flex gap-3">
          <button onClick={() => { setSelected({}); setPage(0); }} className="px-4 py-2 text-xs font-bold border border-bcgGreen dark:border-bcgGold text-bcgGreen dark:text-bcgGold rounded-lg hover:bg-bcgGreen/10 transition-colors">{t.retry}</button>
          <button onClick={handleNext} className="px-4 py-2 text-xs font-bold bg-bcgGreen dark:bg-bcgGold text-white dark:text-bcgGreen rounded-lg hover:bg-[#002b20] transition-colors shadow-sm">{t.next}</button>
        </div>
      </div>
    </div>
  );
};

const ValueNetLab = ({lang}) => {
  const [nodes, setNodes] = useState({ top: null, bottom: null, left: null, right: null });
  const [pool, setPool] = useState(['Customers', 'Suppliers', 'Competitors', 'Complementors']);
  const isZh = lang === 'zh';
  const labels = isZh ? {'Customers':'客戶', 'Suppliers':'供應商', 'Competitors':'競爭者', 'Complementors':'互補者'} : {'Customers':'Customers', 'Suppliers':'Suppliers', 'Competitors':'Competitors', 'Complementors':'Complementors'};
  const check = { top: 'Customers', bottom: 'Suppliers', left: 'Competitors', right: 'Complementors' };

  const handleDragStart = (e, item, source) => { e.dataTransfer.setData('item', item); e.dataTransfer.setData('source', source); };
  const handleDrop = (e, targetPos) => {
    e.preventDefault(); const item = e.dataTransfer.getData('item'); const source = e.dataTransfer.getData('source');
    if (!item) return;
    let newNodes = { ...nodes }; let newPool = [ ...pool ];
    if (source === 'pool') newPool = newPool.filter(i => i !== item);
    else newNodes[source] = null;
    if (targetPos !== 'pool') {
      if (newNodes[targetPos]) newPool.push(newNodes[targetPos]);
      newNodes[targetPos] = item;
    } else newPool.push(item);
    setNodes(newNodes); setPool(newPool);
  };
  const handleDragOver = (e) => e.preventDefault();
  const handleReset = () => { setNodes({ top: null, bottom: null, left: null, right: null }); setPool(['Customers', 'Suppliers', 'Competitors', 'Complementors'].sort(()=>Math.random()-0.5)); };
  const isWin = Object.keys(nodes).every(k => nodes[k] === check[k]);

  const renderSlot = (pos, labelHint) => (
    <div onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, pos)} className={`w-32 h-12 border-2 border-dashed rounded flex items-center justify-center text-sm font-bold transition-colors ${nodes[pos] === check[pos] ? 'bg-green-100 border-green-500 dark:bg-green-900/30 text-green-700 dark:text-green-400' : nodes[pos] ? 'bg-red-100 border-red-500 dark:bg-red-900/30 text-red-700 dark:text-red-400' : 'border-slate-400 bg-slate-50 dark:bg-slate-700 text-slate-500'}`}>
      {nodes[pos] ? (<div draggable onDragStart={(e) => handleDragStart(e, nodes[pos], pos)} className="w-full h-full flex items-center justify-center cursor-move bg-bcgGold text-bcgGreen rounded shadow hover:scale-105 transition-transform">{labels[nodes[pos]]}</div>) : (<span className="opacity-60">{labelHint}</span>)}
    </div>
  );

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700 select-none shadow-sm md:col-span-2">
      <h4 className="font-serif font-bold text-lg text-bcgGreen dark:text-bcgGold mb-2">{isZh?'價值網拖曳配置 (Value Net)':'Value Net Builder'}</h4>
      <p className="text-xs text-slate-500 mb-6">{isZh?'將下方角色拖曳 (Drag & Drop) 至正確的空格中，完成價值網架構。':'Drag and drop roles into the correct slots to complete the Value Net architecture.'}</p>
      <div className="min-h-[60px] p-4 mb-6 rounded-lg bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 flex flex-wrap justify-center items-center gap-3" onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, 'pool')}>
        <span className="text-xs font-bold text-slate-400 w-full text-center block mb-2">{isZh?'待分配區 (Pool)':'Draggable Roles'}</span>
        {pool.map(item => (<div key={item} draggable onDragStart={(e) => handleDragStart(e, item, 'pool')} className="cursor-move px-4 py-2 bg-bcgGold text-bcgGreen text-sm font-bold rounded shadow hover:scale-105 transition-transform">{labels[item]}</div>))}
      </div>
      <div className="relative w-full max-w-sm h-64 mx-auto select-none my-8">
        <div className="absolute inset-0 flex flex-col items-center justify-between z-10">
          {renderSlot('top', isZh?'拖曳至此 (上)':'Drop (Top)')}
          <div className="w-full flex justify-between items-center px-0">
             {renderSlot('left', isZh?'拖曳至此 (左)':'Drop (Left)')}
             <div className="w-20 h-20 bg-bcgGreen text-bcgGold rounded-full flex flex-col items-center justify-center font-black shadow-lg"><span className="text-xs">FIRM</span><span className="text-[10px] opacity-80">(本企業)</span></div>
             {renderSlot('right', isZh?'拖曳至此 (右)':'Drop (Right)')}
          </div>
          {renderSlot('bottom', isZh?'拖曳至此 (下)':'Drop (Bottom)')}
        </div>
        <svg className="absolute inset-0 pointer-events-none z-0" width="100%" height="100%"><line x1="50%" y1="20%" x2="50%" y2="80%" stroke="currentColor" className="text-slate-300 dark:text-slate-600" strokeWidth="2" strokeDasharray="4"/><line x1="20%" y1="50%" x2="80%" y2="50%" stroke="currentColor" className="text-slate-300 dark:text-slate-600" strokeWidth="2" strokeDasharray="4"/></svg>
      </div>
      <div className="text-center mt-8">
        {isWin ? <p className="text-green-600 dark:text-green-400 font-bold text-sm mb-3">🎉 {isZh?'價值網架構完成！':'Value Net Complete!'}</p> : <p className="h-6 mb-3"></p>}
        <button onClick={handleReset} className="px-6 py-2 text-xs font-bold border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors shadow-sm">{isZh?'重置畫布 (Reset)':'Reset Canvas'}</button>
      </div>
    </div>
  );
};

const LinkCard = ({label, url, desc}) => (
  <a href={url} target="_blank" rel="noopener noreferrer" className="block bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 hover:border-bcgGreen dark:hover:border-bcgGold hover:shadow-md transition-all group">

);

// Main App
const TOTAL = 9; 
const N = 5;

function App() {
  const [lang, setLang] = useState('en'); // Default EN per PDF
  const [isDark, setIsDark] = useState(true); // Default Dark per PDF
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  const [analytics, setAnalytics] = useState({ time: Array(N).fill(0), clicks: Array(N).fill(0), quizCorrect: Array(N).fill(0), quizTotal: Array(N).fill(0), cardsRead: Array(N).fill(0), cardsTotal: Array(N).fill(0) });
  
  const [ipWarning, setIpWarning] = useState(false);

  const t = dict[lang];
  const timerRef = useRef(null);

  // Menu List with original elegant icons (applied to sidebar and dropdown)
  const modulesList = [
    {id:0, icon:<IconHome size={16}/>, title:t.m0_nav},
    {id:1, icon:<IconLayers size={16}/>, title:t.m1_nav},
    {id:2, icon:<IconTrendingUp size={16}/>, title:t.m2_nav},
    {id:3, icon:<IconZap size={16}/>, title:t.m3_nav},
    {id:4, icon:<IconTarget size={16}/>, title:t.m4_nav},
    {id:5, icon:<IconCpu size={16}/>, title:t.m5_nav},
    {id:6, icon:<IconGlobe size={16}/>, title:t.m6_nav},
    {id:7, icon:<IconZapLab size={16}/>, title:t.mlab_nav},
    {id:8, icon:<IconBarChart2 size={16}/>, title:t.analytics_title}
  ];

  // Security Mechanisms: Strict Enforcement of PDF Rules with Exemptions
  useEffect(() => {
    const handleKey = (e) => {
      const isF12 = e.key === 'F12';
      const isCtrlU = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u';
      const isCtrlS = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's';
      const isCtrlP = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'p';
      const isCtrlShiftDev = (e.ctrlKey || e.metaKey) && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase());

      // PDF 豁免機制：開放 Ctrl+P 與 Ctrl+S
      if (isCtrlP || isCtrlS) return; 

      if (isF12 || isCtrlU || isCtrlShiftDev) {
        e.preventDefault();
        setIpWarning(true);
        setTimeout(() => setIpWarning(false), 2500);
      }
    };
    
    const handleContext = (e) => {
      // 智慧右鍵判斷：若學生有反白文字，則允許右鍵；若無反白且不在輸入框上，則攔截
      const selection = window.getSelection().toString();
      if (selection || ['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) {
        return; 
      }
      
      e.preventDefault();
      setIpWarning(true);
      setTimeout(() => setIpWarning(false), 2500);
    };
    
    window.addEventListener('keydown', handleKey);
    window.addEventListener('contextmenu', handleContext);
    return () => { 
      window.removeEventListener('keydown', handleKey); 
      window.removeEventListener('contextmenu', handleContext); 
    };
  }, []);

  // Theme & Scroll & Timer
  useEffect(() => { isDark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark'); }, [isDark]);
  useEffect(() => {
    window.scrollTo({top:0,behavior:'smooth'});
    if (timerRef.current) clearInterval(timerRef.current);
    const mi = module - 1;
    if (mi >= 0 && mi < N) { timerRef.current = setInterval(() => { setAnalytics(a => { const t2 = [...a.time]; t2[mi]++; return {...a, time: t2}; }); }, 1000); }
    return () => clearInterval(timerRef.current);
  }, [module]);

  const handleClick = () => { const mi = module - 1; if (mi >= 0 && mi < N) setAnalytics(a => { const c = [...a.clicks]; c[mi]++; return {...a, clicks: c}; }); };
  const handleQuizSubmit = (modId, correct, total) => { const mi = modId - 1; if (mi >= 0 && mi < N) setAnalytics(a => { const qc=[...a.quizCorrect]; const qt=[...a.quizTotal]; qc[mi]=correct; qt[mi]=total; return {...a, quizCorrect:qc, quizTotal:qt}; }); };
  const handleCardRead = (modId, read, total) => { const mi = modId - 1; if (mi >= 0 && mi < N) setAnalytics(a => { const cr=[...a.cardsRead]; const ct=[...a.cardsTotal]; cr[mi]=read; ct[mi]=total; return {...a, cardsRead:cr, cardsTotal:ct}; }); };

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { window.speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { window.speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { window.speechSynthesis.resume(); setTtsState('playing'); return; }
      window.speechSynthesis.cancel();
      const text = `${t.title}. ${module>0 && module<=N ? t[`m${module}_title`] : ''}`;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh') { const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW'); if(v)utterance.voice=v; utterance.lang='zh-TW'; }
      else { const v = voices.find(v=>v.lang==='en-GB'&&v.name.includes('Male'))||voices.find(v=>v.lang==='en-GB'); if(v)utterance.voice=v; utterance.lang='en-GB'; }
      utterance.onend = () => setTtsState('idle'); utterance.onerror = () => setTtsState('idle');
      window.speechSynthesis.speak(utterance); setTtsState('playing');
    }
  };

  const handleExportCSV = () => {
    const BOM = '\uFEFF';
    const mKeys = ['m1_nav','m2_nav','m3_nav','m4_nav','m5_nav'];
    const rows = [[t.analytics_group,t.analytics_id,t.analytics_name],[studentInfo.group,studentInfo.id,studentInfo.name],[],
      [t.analytics_module,t.analytics_time,t.analytics_clicks,t.analytics_cards_read,t.analytics_correct_ans_total],
      ...Array.from({length:N},(_,i)=>{
        const acc=analytics.quizTotal[i]>0?Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%':t.analytics_no_data;
        const ans=analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]}/${analytics.quizTotal[i]}`:t.analytics_no_data;
        const cards=`${analytics.cardsRead[i]}/${analytics.cardsTotal[i]||8}`;
        return [t[mKeys[i]],analytics.time[i]+t.analytics_sec,analytics.clicks[i]+t.analytics_times,cards,ans];
      })];
    const csv = BOM + rows.map(r=>r.join(',')).join('\n');
    const safeName = studentInfo.name.replace(/[^a-z0-9]/gi, '_');
    const safeDate = new Date().toISOString().slice(0,10).replace(/-/g,'');
    
    // Strict Filename implementation
    const fname = `[${t.brand}]${t.title}_[${studentInfo.group}${studentInfo.id}]${safeName}_${safeDate}.csv`;
    const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download=fname; a.click();
  };

  const renderNavBottom = () => (
    <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700 select-none">
      <button onClick={()=>setModule(Math.max(0,module-1))} disabled={module===0} className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-bcgGreen dark:hover:text-bcgGold disabled:opacity-0 transition-colors uppercase text-sm tracking-wider flex items-center">← {t.nav_prev}</button>
      <button onClick={()=>setModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1} className="px-8 py-3 bg-bcgGreen dark:bg-bcgGold text-white dark:text-bcgGreen font-serif font-bold hover:bg-[#002b20] transition-colors flex items-center uppercase text-sm tracking-wider shadow-md rounded-lg">{t.nav_next} <IconArrowRight size={16} className="ml-2"/></button>
    </div>
  );

  const H2 = ({children}) => <h2 className="text-2xl sm:text-3xl font-serif font-black text-bcgGreen dark:text-bcgGold border-b-2 border-bcgGold/50 pb-4 select-none">{children}</h2>;
  const fade = "animate-fade-in";

  const renderContent = () => {
    // ==== 首頁 (Module 0) ====
    if (module === 0) return (
      <div className={`space-y-8 text-base leading-relaxed text-slate-700 dark:text-slate-300 ${fade}`}>
        <div className="bg-bcgGreen dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white relative overflow-hidden select-none">
          <p className="text-xs font-bold uppercase tracking-widest text-bcgGold mb-3">{lang==='zh'?'執行概要':'Executive Summary'}</p>
          <h2 className="text-3xl md:text-4xl font-serif font-black mb-4 relative z-10">{t.m0_title}</h2>
          <p className="text-bcgGold/90 text-sm leading-relaxed max-w-2xl relative z-10">{t.m0_intro}</p>
        </div>

        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-bcgGold shadow-sm">
          <h3 className="text-xl font-bold font-serif text-bcgGreen dark:text-bcgGold mb-3">{t.m0_why}</h3>
          <p className="text-sm">{t.m0_why_desc}</p>
        </div>
        
        {/* SVG Reduced to ~2/3 size with mathematically adjusted inner coordinates for perfect readability */}
        <div className="w-full sm:w-2/3 max-w-lg mx-auto p-5 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm select-none">
           <SvgHome lang={lang} />
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 select-none">{t.m0_stats.map((s,i)=>(
          <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-2xl font-black font-serif text-bcgGreen dark:text-bcgGold mb-1">{s.val}</div>
            <div className="text-xs text-slate-500">{s.label}</div>
          </div>
        ))}</div>

        {/* M0 Bottom Module Navigation Blocks Restored with directly clickable interface */}
        <div className="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 select-none">
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-4 flex items-center gap-2"><IconLayers size={20}/> {lang==='zh'?'課程模組清單':'Course Modules'}</h3>
          <div className="grid md:grid-cols-2 gap-4">{t.m0_modules.map((m,i)=>(
            <button key={i} onClick={()=>{setModule(i+1); window.scrollTo({top:0});}} className="w-full flex flex-col justify-start items-start bg-white dark:bg-slate-800 rounded-xl px-6 py-5 border border-slate-200 dark:border-slate-700 hover:border-bcgGreen dark:hover:border-bcgGold hover:shadow-md transition-all text-left group">
              <div className="flex w-full items-center justify-between mb-3">
                 <div className="text-2xl font-black font-serif text-bcgGold shrink-0">{m.num}</div>
                 <IconChevronRight size={18} className="text-slate-300 dark:text-slate-600 group-hover:text-bcgGreen dark:group-hover:text-bcgGold shrink-0"/>
              </div>
              <div className="font-bold font-serif text-base text-bcgGreen dark:text-bcgGold mb-2">{m.title}</div>
              <div className="text-xs leading-relaxed text-slate-500 dark:text-slate-400">{m.desc}</div>
            </button>
          ))}</div>
        </div>

        <div className="flex justify-end select-none mt-6">
          <button onClick={()=>{setModule(1); window.scrollTo({top:0});}} className="px-8 py-3 bg-bcgGreen dark:bg-bcgGold text-white dark:text-bcgGreen font-serif font-bold rounded-lg shadow-md hover:scale-105 transition-transform flex items-center gap-2">{t.m0_start} <IconPlay size={16}/></button>
        </div>
      </div>

    // ==== 單元 1-5 ====
    if (module >= 1 && module <= N) {
      const mk = `m${module}`;
      const svgs = [<SvgM1 lang={lang}/>, <SvgM2 lang={lang}/>, <SvgM3 lang={lang}/>, <SvgM4 lang={lang}/>, <SvgM5 lang={lang}/>];
      return (
        <div className={`space-y-8 text-base leading-relaxed text-slate-700 dark:text-slate-300 ${fade}`}>
          <H2>{t[`${mk}_title`]}</H2>
          <p>{t[`${mk}_p1`]}</p>
          <p className="p-4 bg-slate-100 dark:bg-slate-800/50 rounded-lg italic font-serif text-slate-600 dark:text-slate-400 border-l-4 border-bcgGold select-none">{t[`${mk}_p2`]}</p>
          <p>{t[`${mk}_p3`]}</p>
          
          <div className="grid md:grid-cols-2 gap-6 select-none">{t[`${mk}_cards`].map((c,i)=>(

              <p className="text-sm">{c.desc}</p>

          {/* SVG Moved to above Wrap-up. Scaled to exactly 1/2 size with doubled text size for readability */}

    }
    
    // ==== 外部資源 (Module 6) 原貌恢復 ====
    if (module === 6) {
      const links = [
        {label:lang==='zh'?'Grant 教科書第四章 PDF（課程指定）':'Grant Ch.4 PDF (Course Required)',url:'#',desc:lang==='zh'?'Further Topics in Industry and Competitive Analysis':'Further Topics in Industry and Competitive Analysis'},
        {label:lang==='zh'?'Brandenburger & Nalebuff: Co-opetition（經典著作）':'Brandenburger & Nalebuff: Co-opetition (Classic)',url:'https://www.amazon.com/Co-Opetition-Adam-M-Brandenburger/dp/0385479506',desc:lang==='zh'?'競合策略的開山之作，提出價值網與 PARTS 架構':'The foundational work on co-opetition, introducing Value Net and PARTS'},
        {label:lang==='zh'?'台積電 OIP 官方頁面':'TSMC OIP Official Page',url:'https://esg.tsmc.com/ch/update/innovationAndService/caseStudy/1/index.html',desc:lang==='zh'?'了解台積電開放創新平台的生態系架構':'Explore TSMC Open Innovation Platform ecosystem'},
        {label:lang==='zh'?'Porter 五力分析影片（HBR）':'Porter Five Forces Video (HBR)',url:'https://www.youtube.com/watch?v=mYF2_FBCvXw',desc:lang==='zh'?'Harvard Business Review 製作的五力框架動畫解說':'HBR animated explainer on Porter Five Forces'},
      ];
      const otherLinks = [
        {icon:'🎮',cat:lang==='zh'?'賽局理論':'Game Theory',items:[
          {label:lang==='zh'?'賽局理論入門（Khan Academy）':'Game Theory Intro (Khan Academy)',url:'https://www.khanacademy.org/economics-finance-domain/ap-microeconomics/imperfect-competition/oligopoly-and-game-theory/v/prisoners-dilemma-and-nash-equilibrium',desc:lang==='zh'?'囚犯困境與納許均衡的影片教學':'Video tutorial on prisoners\' dilemma and Nash equilibrium'},
          {label:lang==='zh'?'耶魯大學賽局理論公開課':'Yale Game Theory Open Course',url:'https://oyc.yale.edu/economics/econ-159',desc:lang==='zh'?'Ben Polak 教授的完整賽局理論課程':'Prof. Ben Polak\'s complete game theory course'},
        ]},
        {icon:'🏭',cat:lang==='zh'?'台灣產業案例':'Taiwan Industry Cases',items:[
          {label:lang==='zh'?'Gogoro vs 光陽策略分析（科技新報）':'Gogoro vs KYMCO Strategy (TechNews)',url:'https://technews.tw/2018/04/07/kymco-vs-gogoro/',desc:lang==='zh'?'深入比較兩家電動機車廠的策略差異':'In-depth comparison of two EV scooter firms\' strategic differences'},
          {label:lang==='zh'?'台灣便利商店競爭格局（2025）':'Taiwan CVS Competition (2025)',url:'https://t303eye.blogspot.com/2025/11/2025-7-eleven-2026.html',desc:lang==='zh'?'7-ELEVEN、全家、萊爾富的優劣比較':'Comparison of 7-ELEVEN, FamilyMart, Hi-Life strategies'},
        ]},
      ];
      return (
        <div className={`space-y-8 ${fade}`}>
          <H2>{t.m6_title}</H2>
          <p className="text-slate-500 dark:text-slate-400 select-none">{t.m6_desc}</p>
          <div className="grid md:grid-cols-2 gap-4">{links.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
          <div className="space-y-6 mt-8">
            {otherLinks.map((sec,si)=>(
              <div key={si} className="select-none">
                <h3 className="flex items-center gap-2 text-base font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-3"><span>{sec.icon}</span>{sec.cat}</h3>
                <div className="grid md:grid-cols-2 gap-4">{sec.items.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
              </div>
            ))}
          </div>
          <div className="bg-bcgGreen/5 dark:bg-bcgGold/5 rounded-xl p-5 border border-bcgGreen/20 dark:border-bcgGold/20 select-none">
            <p className="text-sm text-slate-600 dark:text-slate-400">{lang==='zh'?'⚠️ 以上連結為外部資源，內容由原始作者維護，僅供學術參考之用。':'⚠️ External links maintained by original authors. For academic reference only.'}</p>
          </div>
          {renderNavBottom()}
        </div>
      );
    }
    
    // ==== 互動實驗室 (Module 7) 原貌恢復 4個互動模型 + 價值網 ====
    if (module === 7) return (
      <div className={`space-y-8 ${fade}`}>
        <H2>{t.mlab_title}</H2>
        <p className="text-slate-500 dark:text-slate-400 select-none">{t.mlab_desc}</p>
        <div className="grid md:grid-cols-2 gap-6">
          <FiveForcesPlusLab lang={lang}/>
          <LifecycleLab lang={lang}/>
          <PrisonersDilemmaLab lang={lang}/>
          <AMCLab lang={lang}/>
          <ValueNetLab lang={lang} />
        </div>
        {renderNavBottom()}
      </div>
    );
    
    // ==== 學習歷程分析 (Module 8) ====
    if (module === 8) {
      const totalTime = analytics.time.reduce((a,b)=>a+b,0);
      const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
      const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
      const totalAnswered = analytics.quizTotal.reduce((a,b)=>a+b,0);
      const overallAcc = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100)+'%' : t.analytics_no_data;
      const canExport = studentInfo.group && studentInfo.id && studentInfo.name;
      const mNavKeys = ['m1_nav','m2_nav','m3_nav','m4_nav','m5_nav'];

      return (
        <div className={`space-y-8 ${fade} select-none`}>
          <H2>{t.analytics_title}</H2>
          <p className="text-slate-500 dark:text-slate-400">{t.analytics_desc}</p>
          
          {/* Dashboard Cards */}
          <div className="grid grid-cols-3 gap-4">
            {[{label:t.analytics_total_time,val:totalTime+t.analytics_sec},{label:t.analytics_total_clicks,val:totalClicks+t.analytics_times},{label:t.analytics_overall_acc,val:overallAcc}].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center shadow-sm">
              <p className="text-2xl md:text-3xl font-black font-serif text-bcgGreen dark:text-bcgGold">{s.val}</p>
              <p className="text-xs text-slate-500 dark:text-slate-400 mt-2">{s.label}</p>
            </div>
            ))}
          </div>

          {/* Records Table - with required columns */}
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="bg-bcgGreen dark:bg-slate-900 text-bcgGold">
                  <th className="text-left p-3 font-bold whitespace-nowrap">{t.analytics_module}</th>
                  <th className="text-center p-3 font-bold whitespace-nowrap">{t.analytics_time}</th>
                  <th className="text-center p-3 font-bold whitespace-nowrap">{t.analytics_clicks}</th>
                  <th className="text-center p-3 font-bold whitespace-nowrap">{t.analytics_cards_read}</th>
                  <th className="text-center p-3 font-bold whitespace-nowrap">{t.analytics_acc}</th>
                </tr></thead>
                <tbody>{Array.from({length:N},(_,i)=>{
                  const acc=analytics.quizTotal[i]>0?Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%':t.analytics_no_data;
                  const cards=`${analytics.cardsRead[i]} / ${analytics.cardsTotal[i]||'-'}`;
                  return <tr key={i} className="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                    <td className="p-3 font-bold text-bcgGreen dark:text-bcgGold">{t[mNavKeys[i]]}</td>
                    <td className="p-3 text-center">{analytics.time[i]}{t.analytics_sec}</td>
                    <td className="p-3 text-center">{analytics.clicks[i]}{t.analytics_times}</td>
                    <td className="p-3 text-center font-mono">{cards}</td>
                    <td className="p-3 text-center font-mono">{acc}</td>
                  </tr>;
                })}</tbody>
              </table>
            </div>
          </div>

          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
            <h3 className="font-serif font-bold text-lg text-bcgGreen dark:text-bcgGold mb-4">{t.analytics_form_title}</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div><label className="block text-xs font-semibold text-slate-500 mb-1">{t.analytics_group}*</label>
                <select value={studentInfo.group} onChange={e=>setStudentInfo({...studentInfo,group:e.target.value})} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200"><option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
              <div><label className="block text-xs font-semibold text-slate-500 mb-1">{t.analytics_dept}</label>
                <input value={studentInfo.dept} onChange={e=>setStudentInfo({...studentInfo,dept:e.target.value})} placeholder={t.analytics_dept_ph} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-500 mb-1">{t.analytics_id}*</label>
                <input value={studentInfo.id} onChange={e=>setStudentInfo({...studentInfo,id:e.target.value})} placeholder={t.analytics_id_ph} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-500 mb-1">{t.analytics_name}*</label>
                <input value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo,name:e.target.value})} placeholder={t.analytics_name_ph} className="w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200"/></div>
            </div>
            <button onClick={handleExportCSV} disabled={!canExport} className="mt-6 px-6 py-2.5 bg-bcgGreen dark:bg-bcgGold text-white dark:text-bcgGreen font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors text-sm w-full md:w-auto shadow-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
          </div>
          {renderNavBottom()}
        </div>
      );
    }
  };

  return (
    <div className="min-h-screen flex flex-col pt-16">
      {/* IP Protection Modal Overlay - select-none globally applied here */}
      {ipWarning && (
        <div className="fixed inset-0 z-[9999] bg-black/60 backdrop-blur-sm flex items-center justify-center animate-fade-in select-none">
          <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-2xl border-2 border-red-500 text-center max-w-sm">
            <div className="text-red-500 mb-4"><IconX size={48} className="mx-auto"/></div>
            <h3 className="font-serif font-black text-xl text-slate-800 dark:text-slate-200 mb-2">Intellectual Property</h3>
            <p className="text-slate-600 dark:text-slate-400 font-bold">of Prof. Shihmin Lo</p>
          </div>
        </div>
      )}

      {/* Header (select-none enabled) */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-bcgGreen dark:bg-slate-900 text-white z-50 shadow-lg border-b border-bcgGold/30 select-none">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center space-x-2 sm:space-x-4">
            <button className="p-2 hover:bg-white/10 rounded-lg relative" onClick={()=>setMenuOpen(!menuOpen)}>
              {menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}
            </button>
            <button onClick={()=>{setModule(0); window.scrollTo({top:0,behavior:'smooth'});}} className="flex items-center gap-3 hover:opacity-80 transition-opacity text-left">
              <div className="bg-bcgGold text-bcgGreen font-black text-sm px-2 py-1 rounded shadow-inner tracking-widest">{t.brand}</div>
              <div className="hidden sm:block"><h1 className="font-serif font-bold text-sm leading-tight">{t.title}</h1></div>
            </button>
          </div>
          <div className="flex items-center space-x-1 sm:space-x-2">
            {/* 新增的 Home 鍵 */}
            <button onClick={()=>{setModule(0); window.scrollTo({top:0,behavior:'smooth'});}} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-full transition-colors mr-1" title="Home">
              <IconHome size={18}/>
            </button>
            <div className="flex bg-white/10 rounded-full p-1 mr-1 sm:mr-2">
              <button onClick={()=>handleTTS('play')} className="p-1.5 rounded-full hover:bg-white/20"><IconPlay size={14}/></button>
              <button onClick={()=>handleTTS('pause')} className="p-1.5 rounded-full hover:bg-white/20 mx-1"><IconPause size={14}/></button>
              <button onClick={()=>handleTTS('stop')} className="p-1.5 rounded-full hover:bg-white/20"><IconSquare size={14}/></button>
            </div>
            <button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 text-xs font-bold bg-white/10 hover:bg-white/20 rounded-full mr-1 sm:mr-2">{lang==='zh'?'EN':'中文'}</button>
            {/* 深淺背景切換：已確實移至最右邊 */}
            <button onClick={()=>setIsDark(!isDark)} className="flex items-center justify-center p-1.5 sm:p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors ml-2">
               {isDark ? <IconSun size={18} /> : <IconMoon size={18} />}
            </button>
          </div>
        </div>
        {/* Dropdown Menu */}
        {menuOpen && (
          <div className="absolute top-16 left-4 w-64 max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] text-slate-800 dark:text-slate-200">
            <div className="bg-bcgGreen/5 dark:bg-bcgGold/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500">{t.nav_modules}</p></div>
            {modulesList.map(m=>(
              <button key={m.id} onClick={()=>{setModule(m.id); window.scrollTo({top:0}); setMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left border-b border-slate-100 dark:border-slate-700 last:border-0 ${module===m.id?'bg-bcgGreen text-white dark:bg-bcgGold/20 dark:text-bcgGold font-bold':'hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                <span className={module===m.id?'text-bcgGold':'opacity-60'}>{m.icon}</span> <span className="truncate">{m.title}</span>
              </button>
            ))}
          </div>
        )}
      </header>

      {/* Main Container: added pb-16 to avoid fixed footer overlap */}
      <div className="max-w-7xl mx-auto w-full px-4 flex-1 flex flex-col md:flex-row gap-6 py-8 pb-16">
        {/* Sidebar Nav */}
        <aside className="hidden md:block w-64 shrink-0 select-none">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden sticky top-24">
            <div className="bg-bcgGreen/5 dark:bg-bcgGold/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500">{t.nav_modules}</p></div>
            <nav className="p-2 space-y-1">{modulesList.map(m=>(
              <button key={m.id} onClick={()=>{setModule(m.id); window.scrollTo({top:0});}} className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-bcgGreen dark:bg-bcgGold/20 text-white dark:text-bcgGold border border-bcgGold/30':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                <span className={`mr-2.5 ${module===m.id?'text-bcgGold':'opacity-50'}`}>{m.icon}</span><span className="truncate">{m.title}</span>
                {module===m.id&&<IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
              </button>
            ))}</nav>
          </div>
        </aside>
        
        {/* Main Content Area */}
        <main className="flex-1 min-w-0" onClick={handleClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 sm:p-8 md:p-10">{renderContent()}</div>
        </main>
      </div>

      {/* Fixed Footer (Height = Header * 0.5 i.e., h-8) - select-none */}
      <footer className="fixed bottom-0 left-0 right-0 h-8 bg-bcgGreen dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-bcgGold flex items-center select-none z-40">
        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4"><span className="font-serif font-black text-bcgGold hidden sm:inline tracking-widest">{t.brand}</span><span className="truncate">{t.copyright} · {t.date}</span></div>
          <div className="flex items-center space-x-3 md:space-x-4">
            <span className="text-bcgGold/70 font-serif hidden sm:inline">Architect: <a href={t.architect_url} target="_blank" className="text-bcgGold hover:text-white underline underline-offset-2">Prof. Shihmin Lo</a></span>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-600 pl-3"><IconChevronUp size={12} className="mr-1"/><span className="hidden sm:inline">TOP</span></button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
